<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Rental Companies – RideMachan</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/sidebar.css" />
    <link rel="stylesheet" href="css/rental-companies.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <main class="main-content">
        <header class="page-header">
          <div class="header-content">
            <h1 class="page-title">Rental Companies</h1>
            <p class="page-subtitle companies-count">Loading companies...</p>
          </div>
          <div class="header-actions">
            <button class="btn btn-primary" id="btnOpenRegisterCompany">
              + Register Company
            </button>
            <a class="btn btn-secondary" href="rental-company-requests.html"
              >Pending Requests</a
            >
          </div>
        </header>

        <!-- Search & Filters -->
        <section class="search-filter-section">
          <div class="filter-row">
            <div class="form-group">
              <label class="form-label" for="nameSearch">Company name</label>
              <input
                id="nameSearch"
                class="form-control"
                placeholder="e.g., ABC Rentals"
                autocomplete="off"
              />
            </div>

            <div class="form-group">
              <label class="form-label" for="locationFilter">Location</label>
              <select id="locationFilter" class="form-select">
                <option value="">All</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label" for="sortSelect">Sort</label>
              <select id="sortSelect" class="form-select">
                <option value="name_asc">Name: A → Z</option>
                <option value="name_desc">Name: Z → A</option>
                <option value="rating_desc">Rating: High → Low</option>
                <option value="rating_asc">Rating: Low → High</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label">Min rating</label>
              <div class="rating-stars rating-filter-stars" id="ratingFilter">
                <button type="button" class="star" data-value="1"></button>
                <button type="button" class="star" data-value="2"></button>
                <button type="button" class="star" data-value="3"></button>
                <button type="button" class="star" data-value="4"></button>
                <button type="button" class="star" data-value="5"></button>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">With driver</label>
              <label class="checkbox-container">
                <input id="withDriverFilter" type="checkbox" />
                <span class="checkmark"></span>
                <span>Show companies offering a driver</span>
              </label>
            </div>

            <div class="form-group">
              <label class="form-label" for="fleetMin">Min fleet size</label>
              <input
                id="fleetMin"
                class="form-control"
                type="number"
                min="0"
                placeholder="e.g., 10"
              />
            </div>

            <div class="form-group">
              <label class="form-label" for="fleetMax">Max fleet size</label>
              <input
                id="fleetMax"
                class="form-control"
                type="number"
                min="0"
                placeholder="e.g., 100"
              />
            </div>

            <div class="form-group">
              <label class="form-label" for="reviewsMin">Min reviews</label>
              <input
                id="reviewsMin"
                class="form-control"
                type="number"
                min="0"
                placeholder="e.g., 20"
              />
            </div>
          </div>

          <div class="search-actions">
            <button id="btnSearch" class="btn btn-primary">Search</button>
            <button id="btnReset" class="btn btn-secondary">Reset</button>
          </div>
        </section>

        <!-- Results -->
        <section class="companies-section">
          <div class="companies-grid" id="companiesGrid"></div>
        </section>
        <!-- Register Company Modal -->
        <div class="modal" id="registerCompanyModal" aria-hidden="true">
          <div
            class="modal-content"
            role="dialog"
            aria-modal="true"
            aria-labelledby="rcmTitle"
          >
            <div class="modal-header">
              <h3 id="rcmTitle">Register New Company</h3>
              <button
                class="modal-close"
                id="closeRegisterCompany"
                aria-label="Close"
              >
                &times;
              </button>
            </div>

            <form id="registerCompanyForm">
              <div class="modal-body">
                <div class="form-row">
                  <!-- companyname -->
                  <div class="form-group">
                    <label class="form-label" for="rcCompanyName"
                      >Company name</label
                    >
                    <input
                      id="rcCompanyName"
                      class="form-control"
                      required
                      placeholder="e.g., ABC Rentals"
                    />
                  </div>

                  <!-- companyemail -->
                  <div class="form-group">
                    <label class="form-label" for="rcCompanyEmail"
                      >Company email</label
                    >
                    <input
                      id="rcCompanyEmail"
                      class="form-control"
                      type="email"
                      required
                      placeholder="name@company.lk"
                    />
                  </div>

                  <!-- phone -->
                  <div class="form-group">
                    <label class="form-label" for="rcPhone">Phone</label>
                    <input
                      id="rcPhone"
                      class="form-control"
                      placeholder="+94 …"
                    />
                  </div>

                  <!-- registrationnumber -->
                  <div class="form-group">
                    <label class="form-label" for="rcRegNo"
                      >Registration number</label
                    >
                    <input
                      id="rcRegNo"
                      class="form-control"
                      placeholder="e.g., PV 12345 / BR 1234"
                    />
                  </div>

                  <!-- taxid -->
                  <div class="form-group">
                    <label class="form-label" for="rcTaxId">Tax ID</label>
                    <input
                      id="rcTaxId"
                      class="form-control"
                      placeholder="e.g., VAT / TIN"
                    />
                  </div>

                  <!-- street -->
                  <div class="form-group">
                    <label class="form-label" for="rcStreet">Street</label>
                    <input
                      id="rcStreet"
                      class="form-control"
                      placeholder="e.g., No 12, Galle Rd"
                    />
                  </div>

                  <!-- city -->
                  <div class="form-group">
                    <label class="form-label" for="rcCity">City</label>
                    <input
                      id="rcCity"
                      class="form-control"
                      required
                      placeholder="e.g., Colombo"
                    />
                  </div>

                  <!-- description -->
                  <div class="form-group" style="grid-column: 1 / -1">
                    <label class="form-label" for="rcDescription"
                      >Company description</label
                    >
                    <textarea
                      id="rcDescription"
                      class="form-control"
                      rows="3"
                      placeholder="Brief description about your company"
                    ></textarea>
                  </div>

                  <!-- terms -->
                  <div class="form-group" style="grid-column: 1 / -1">
                    <label class="form-label" for="rcTerms"
                      >Terms & Conditions</label
                    >
                    <textarea
                      id="rcTerms"
                      class="form-control"
                      rows="3"
                      placeholder="Fuel policy, late return fees, etc."
                    ></textarea>
                  </div>

                  <!-- certificate upload -->
                  <div class="form-group" style="grid-column: 1 / -1">
                    <label class="form-label" for="rcCertificate"
                      >Business certificate (PDF/Image)</label
                    >
                    <input
                      id="rcCertificate"
                      class="form-control"
                      type="file"
                      accept=".pdf,image/*"
                      required
                    />
                  </div>

                  <!-- tax document upload -->
                  <div class="form-group" style="grid-column: 1 / -1">
                    <label class="form-label" for="rcTaxDoc"
                      >Tax document (PDF/Image)</label
                    >
                    <input
                      id="rcTaxDoc"
                      class="form-control"
                      type="file"
                      accept=".pdf,image/*"
                      required
                    />
                  </div>

                  <!-- password (backend will hash + salt) -->
                  <div class="form-group">
                    <label class="form-label" for="rcPassword">Password</label>
                    <input
                      id="rcPassword"
                      class="form-control"
                      type="password"
                      required
                    />
                  </div>

                  <div class="form-group">
                    <label class="form-label" for="rcPassword2"
                      >Confirm password</label
                    >
                    <input
                      id="rcPassword2"
                      class="form-control"
                      type="password"
                      required
                    />
                  </div>
                </div>
              </div>

              <div class="modal-footer">
                <button type="button" class="btn" id="cancelRegisterCompany">
                  Cancel
                </button>
                <button type="submit" class="btn btn-primary">
                  Save Company
                </button>
              </div>
            </form>
          </div>
        </div>
      </main>
    </div>

    <script src="js/sidebar.js"></script>
    <script src="js/rental-companies.js"></script>
  </body>
</html>
