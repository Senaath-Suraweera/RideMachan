<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Individual Renter | RideMachan Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/sidebar.css" />
    <link rel="stylesheet" href="css/individual-renter-view.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script src="js/sidebar.js"></script>

    <main class="main-content">
      <header class="page-header">
        <div
          class="header-actions"
          style="display: flex; align-items: center; gap: 12px"
        >
          <h1 class="page-title" style="flex: 1">Individual Renter</h1>
          <button id="backToRentersBtn" class="btn btn-secondary">
            ← Back to Individual Renters
          </button>
          <button id="editProfileBtn" class="btn btn-primary">
            Edit Profile
          </button>
          <button id="banUserBtn" class="btn btn-danger">Ban User</button>
        </div>
      </header>

      <section id="renterProfile" class="card"></section>

      <section class="card">
        <div
          class="section-header"
          style="
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
          "
        >
          <h3 class="section-title">Vehicles</h3>
          <button id="addVehicleBtn" class="btn btn-primary">
            + Add Vehicle
          </button>
        </div>
        <div class="vehicles-grid" id="vehiclesGrid"></div>
      </section>
    </main>

    <!-- Provider Profile Edit Modal -->
    <div class="modal" id="profileFormModal" aria-hidden="true">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Edit Provider Profile</h3>
          <button class="modal-close" onclick="closeProfileForm()">×</button>
        </div>
        <div class="modal-body">
          <form id="profileForm">
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label" for="pf_firstname">First Name</label>
                <input class="form-control" id="pf_firstname" />
              </div>

              <div class="form-group">
                <label class="form-label" for="pf_lastname">Last Name</label>
                <input class="form-control" id="pf_lastname" />
              </div>

              <div class="form-group">
                <label class="form-label" for="pf_email">Email</label>
                <input
                  class="form-control"
                  id="pf_email"
                  type="email"
                  readonly
                />
              </div>

              <div class="form-group">
                <label class="form-label" for="pf_phone">Phone</label>
                <input class="form-control" id="pf_phone" />
              </div>

              <div class="form-group">
                <label class="form-label" for="pf_house">House Number</label>
                <input class="form-control" id="pf_house" />
              </div>

              <div class="form-group">
                <label class="form-label" for="pf_street">Street</label>
                <input class="form-control" id="pf_street" />
              </div>

              <div class="form-group">
                <label class="form-label" for="pf_city">City</label>
                <input class="form-control" id="pf_city" />
              </div>

              <div class="form-group">
                <label class="form-label" for="pf_zipcode">Zip Code</label>
                <input class="form-control" id="pf_zipcode" />
              </div>

              <div class="form-group">
                <label class="form-label" for="pf_companyId">Company ID</label>
                <input
                  class="form-control"
                  id="pf_companyId"
                  min="1"
                  readonly
                />
              </div>

              <div class="form-group">
                <label class="form-label" for="pf_status">Status</label>
                <select class="form-select" id="pf_status" disabled>
                  <option value="active">Active</option>
                  <option value="pending">Pending</option>
                  <option value="suspended">Suspended</option>
                </select>
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeProfileForm()">
            Cancel
          </button>
          <button class="btn btn-primary" id="profileFormSubmitBtn">
            Save Profile
          </button>
        </div>
      </div>
    </div>

    <!-- Vehicle Details Modal (Professional) -->
    <div class="modal" id="vehicleModal" aria-hidden="true">
      <div class="modal-content modal-lg">
        <div class="modal-header">
          <h3 id="vehicleModalTitle">Vehicle Details</h3>
          <button class="modal-close" onclick="closeVehicleModal()">×</button>
        </div>
        <div class="modal-body" id="vehicleModalBody"></div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeVehicleModal()">
            Close
          </button>
        </div>
      </div>
    </div>

    <!-- Image Lightbox -->
    <div class="lightbox-overlay" id="imageLightbox" onclick="closeLightbox()">
      <div class="lightbox-content" onclick="event.stopPropagation()">
        <button class="lightbox-close" onclick="closeLightbox()">×</button>
        <img id="lightboxImage" src="" alt="Preview" />
      </div>
    </div>

    <!-- Vehicle Add/Edit Form Modal -->
    <div class="modal" id="vehicleFormModal" aria-hidden="true">
      <div class="modal-content modal-lg">
        <div class="modal-header">
          <h3 id="vehicleFormTitle">Add Vehicle</h3>
          <button class="modal-close" onclick="closeVehicleForm()">×</button>
        </div>
        <div class="modal-body">
          <form id="vehicleForm" enctype="multipart/form-data">
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label" for="vf_make">Make *</label>
                <input class="form-control" id="vf_make" required />
              </div>

              <div class="form-group">
                <label class="form-label" for="vf_model">Model *</label>
                <input class="form-control" id="vf_model" required />
              </div>

              <div class="form-group">
                <label class="form-label" for="vf_reg"
                  >Registration No. *</label
                >
                <input class="form-control" id="vf_reg" required />
              </div>

              <div class="form-group">
                <label class="form-label" for="vf_year"
                  >Manufacture Year *</label
                >
                <input
                  class="form-control"
                  id="vf_year"
                  type="number"
                  min="1900"
                  max="2099"
                  required
                />
              </div>

              <div class="form-group">
                <label class="form-label" for="vf_color">Color *</label>
                <input class="form-control" id="vf_color" required />
              </div>

              <div class="form-group">
                <label class="form-label" for="vf_seats">Seats *</label>
                <input
                  class="form-control"
                  id="vf_seats"
                  type="number"
                  min="1"
                  required
                />
              </div>

              <div class="form-group">
                <label class="form-label" for="vf_enginecapacity"
                  >Engine Capacity *</label
                >
                <input
                  class="form-control"
                  id="vf_enginecapacity"
                  type="number"
                  min="0"
                  required
                />
              </div>

              <div class="form-group">
                <label class="form-label" for="vf_engineno"
                  >Engine Number *</label
                >
                <input class="form-control" id="vf_engineno" required />
              </div>

              <div class="form-group">
                <label class="form-label" for="vf_chasisno"
                  >Chassis Number *</label
                >
                <input class="form-control" id="vf_chasisno" required />
              </div>

              <div class="form-group">
                <label class="form-label" for="vf_milage">Mileage *</label>
                <input class="form-control" id="vf_milage" required />
              </div>

              <div class="form-group">
                <label class="form-label" for="vf_rate">Price Per Day *</label>
                <input
                  class="form-control"
                  id="vf_rate"
                  type="number"
                  min="0"
                  step="0.01"
                  required
                />
              </div>

              <div class="form-group">
                <label class="form-label" for="vf_location">Location *</label>
                <input class="form-control" id="vf_location" required />
              </div>

              <div class="form-group">
                <label class="form-label" for="vf_fuel">Fuel Type *</label>
                <select class="form-select" id="vf_fuel" required>
                  <option value="">Choose…</option>
                  <option value="Petrol">Petrol</option>
                  <option value="Diesel">Diesel</option>
                  <option value="Hybrid">Hybrid</option>
                  <option value="Electric">Electric</option>
                </select>
              </div>

              <div class="form-group">
                <label class="form-label" for="vf_trans">Transmission *</label>
                <select class="form-select" id="vf_trans" required>
                  <option value="">Choose…</option>
                  <option value="Auto">Auto</option>
                  <option value="Manual">Manual</option>
                </select>
              </div>

              <div class="form-group">
                <label class="form-label" for="vf_availability"
                  >Availability</label
                >
                <select class="form-select" id="vf_availability">
                  <option value="available">Available</option>
                  <option value="unavailable">Unavailable</option>
                  <option value="maintenance">Maintenance</option>
                </select>
              </div>

              <div class="form-group">
                <label class="form-label" for="vf_companyId">Company ID</label>
                <input
                  class="form-control"
                  id="vf_companyId"
                  type="number"
                  min="1"
                  readonly
                />
              </div>

              <div class="form-group" style="grid-column: 1 / -1">
                <label class="form-label" for="vf_description"
                  >Description *</label
                >
                <textarea
                  class="form-control"
                  id="vf_description"
                  rows="3"
                  required
                ></textarea>
              </div>

              <!-- Registration Documentation Upload -->
              <div class="form-group" style="grid-column: 1 / -1">
                <label class="form-label">Registration Documentation</label>
                <div class="file-upload-zone" id="regDocZone">
                  <input
                    type="file"
                    id="vf_regDoc"
                    accept="image/*,.pdf"
                    class="file-input-hidden"
                    onchange="handleRegDocSelect(this)"
                  />
                  <div
                    class="upload-placeholder"
                    id="regDocPlaceholder"
                    onclick="document.getElementById('vf_regDoc').click()"
                  >
                    <svg
                      width="40"
                      height="40"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="1.5"
                    >
                      <path
                        d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
                      />
                      <polyline points="14 2 14 8 20 8" />
                      <line x1="12" y1="18" x2="12" y2="12" />
                      <line x1="9" y1="15" x2="12" y2="12" />
                      <line x1="15" y1="15" x2="12" y2="12" />
                    </svg>
                    <span>Click to upload registration document</span>
                    <small>Supports images (JPG, PNG) and PDF files</small>
                  </div>
                  <div
                    class="upload-preview"
                    id="regDocPreview"
                    style="display: none"
                  >
                    <img
                      id="regDocPreviewImg"
                      src=""
                      alt="Registration Doc Preview"
                    />
                    <div class="preview-actions">
                      <span class="preview-filename" id="regDocFilename"></span>
                      <button
                        type="button"
                        class="btn btn-sm btn-danger"
                        onclick="clearRegDoc()"
                      >
                        Remove
                      </button>
                    </div>
                  </div>
                </div>
              </div>

              <!-- Vehicle Images Upload -->
              <div class="form-group" style="grid-column: 1 / -1">
                <label class="form-label">Vehicle Images</label>
                <div class="file-upload-zone" id="vehicleImgZone">
                  <input
                    type="file"
                    id="vf_vehicleImg"
                    accept="image/*"
                    multiple
                    class="file-input-hidden"
                    onchange="handleVehicleImgSelect(this)"
                  />
                  <div
                    class="upload-placeholder"
                    id="vehicleImgPlaceholder"
                    onclick="document.getElementById('vf_vehicleImg').click()"
                  >
                    <svg
                      width="40"
                      height="40"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="1.5"
                    >
                      <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                      <circle cx="8.5" cy="8.5" r="1.5" />
                      <polyline points="21 15 16 10 5 21" />
                    </svg>
                    <span>Click to upload vehicle images</span>
                    <small>You can select multiple images (JPG, PNG)</small>
                  </div>
                  <div class="upload-preview-grid" id="vehicleImgPreview"></div>
                </div>
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeVehicleForm()">
            Cancel
          </button>
          <button class="btn btn-primary" id="vehicleFormSubmitBtn">
            Save Vehicle
          </button>
        </div>
      </div>
    </div>

    <script src="js/individual-renter-view.js"></script>
  </body>
</html>
