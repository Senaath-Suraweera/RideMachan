<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Drivers - Ride Machan</title>

    <!-- Reuse your global styles + sidebar CSS, just like Customers -->
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/sidebar.css" />
    <link rel="stylesheet" href="css/drivers.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <main class="main-content">
        <header class="page-header">
          <div class="header-content">
            <h1 class="page-title">Drivers</h1>
            <div class="header-actions"></div>
          </div>
          <p class="page-subtitle">Drivers</p>
        </header>

        <!-- Search and Filter Section (mirrors Customers) -->
        <div class="filters-container">
          <!-- Row 1 -->
          <div class="filter-row">
            <div class="filter-group">
              <label class="filter-label" for="driverNameFilter"
                >Driver name</label
              >
              <input
                id="driverNameFilter"
                class="filter-input"
                type="text"
                placeholder="e.g., Maria Fernando"
              />
            </div>

            <div class="filter-group">
              <label class="filter-label" for="driverLicenseFilter"
                >License / NIC</label
              >
              <input
                id="driverLicenseFilter"
                class="filter-input"
                type="text"
                placeholder="e.g., B2345678 or 912345678V"
              />
            </div>

            <div class="filter-group">
              <label class="filter-label" for="companyFilter">Company</label>
              <select id="companyFilter" class="filter-select">
                <option value="">All companies</option>
              </select>
            </div>

            <div class="filter-group">
              <label class="filter-label" for="statusFilter">Status</label>
              <select id="statusFilter" class="filter-select">
                <option value="">All statuses</option>
                <option value="Available">Available</option>
                <option value="Busy">Busy</option>
                <option value="Offline">Offline</option>
              </select>
            </div>
          </div>

          <!-- Row 2 -->
          <div class="filter-row">
            <div class="filter-group">
              <label class="filter-label" for="locationFilter">Location</label>
              <input
                id="locationFilter"
                class="filter-input"
                type="text"
                placeholder="e.g., Negombo"
              />
            </div>

            <div class="filter-group">
              <label class="filter-label" for="minRidesFilter">Min rides</label>
              <input
                id="minRidesFilter"
                class="filter-input"
                type="number"
                min="0"
                step="1"
                placeholder="0"
              />
            </div>

            <div class="filter-group">
              <label class="filter-label" for="sortOrder">Sort</label>
              <select id="sortOrder" class="filter-select">
                <option value="ascending">Name (A → Z)</option>
                <option value="descending">Name (Z → A)</option>
              </select>
            </div>

            <div class="filter-group">
              <label class="filter-label">Min rating</label>
              <div class="rating-stars" id="ratingFilter">
                <span class="star" data-value="1">★</span>
                <span class="star" data-value="2">★</span>
                <span class="star" data-value="3">★</span>
                <span class="star" data-value="4">★</span>
                <span class="star" data-value="5">★</span>
                <span class="rating-text" id="ratingText">Any</span>
              </div>
            </div>

            <div class="search-actions">
              <button
                class="btn btn-primary"
                type="button"
                onclick="searchDrivers()"
              >
                Search
              </button>
              <button
                class="btn btn-secondary"
                type="button"
                onclick="clearFilters()"
              >
                Clear
              </button>
            </div>
          </div>
        </div>

        <!-- Drivers List -->
        <section class="drivers-section">
          <div class="section-header">
            <h3 class="section-title">Driver List (0)</h3>
          </div>
          <div class="drivers-grid" id="driversGrid"></div>
        </section>
      </main>
    </div>

    <script src="js/sidebar.js"></script>
    <script src="js/drivers.js"></script>
  </body>
</html>
