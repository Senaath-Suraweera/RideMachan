<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rental Company Requests - Ride Machan</title>

    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/sidebar.css" />
    <link rel="stylesheet" href="css/rental-company-requests.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <main class="main-content">
        <section class="requests-card">
          <div class="card-header">
            <div class="titles">
              <h1 class="page-title">Rental Company Requests</h1>
              <p class="page-subtitle">
                Review pending requests and view rejected registration requests
              </p>
            </div>

            <div class="card-controls">
              <div
                class="chip-group"
                id="statusFilter"
                role="group"
                aria-label="Request status filter"
              >
                <button
                  class="chip active"
                  data-status="PENDING"
                  type="button"
                  title="Show pending requests"
                >
                  Pending
                </button>
                <button
                  class="chip"
                  data-status="REJECTED"
                  type="button"
                  title="Show rejected requests"
                >
                  Rejected
                </button>
              </div>

              <div
                class="chip-group"
                id="alphaSort"
                role="group"
                aria-label="Alphabetical sort"
              >
                <button
                  class="chip active"
                  data-sort="az"
                  type="button"
                  title="Sort A → Z"
                >
                  A–Z
                </button>
                <button
                  class="chip"
                  data-sort="za"
                  type="button"
                  title="Sort Z → A"
                >
                  Z–A
                </button>
              </div>

              <div
                class="chip-group"
                id="dateSort"
                role="group"
                aria-label="Date sort"
              >
                <button
                  class="chip active"
                  data-sort="new"
                  type="button"
                  title="Newest first"
                >
                  Newest
                </button>
                <button
                  class="chip"
                  data-sort="old"
                  type="button"
                  title="Oldest first"
                >
                  Oldest
                </button>
              </div>
            </div>
          </div>

          <div class="table-wrapper">
            <table
              class="requests-table"
              id="requestsTable"
              aria-label="Rental company requests"
            >
              <thead>
                <tr>
                  <th style="width: 72px">#</th>
                  <th>Company Name</th>
                  <th>Email</th>
                  <th>Phone</th>
                  <th style="width: 140px">Status</th>
                  <th style="width: 170px">Submitted Date</th>
                  <th style="width: 180px">Actions</th>
                </tr>
              </thead>
              <tbody id="requestsTbody"></tbody>
            </table>
          </div>

          <div class="pagination-bar" id="paginationBar">
            <div class="pagination-info" id="paginationInfo">
              Showing 0 of 0
            </div>

            <div class="pagination-controls">
              <button type="button" class="page-btn" id="prevPageBtn">
                Prev
              </button>
              <div class="page-numbers" id="pageNumbers"></div>
              <button type="button" class="page-btn" id="nextPageBtn">
                Next
              </button>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="js/sidebar.js"></script>
    <script src="js/rental-company-requests.js" defer></script>
  </body>
</html>
