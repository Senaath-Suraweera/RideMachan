<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reports - Ride Machan</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/sidebar.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/report-view.css" />
  </head>
  <body>
    <div class="container">
      <main class="main-content">
        <header class="page-header">
          <div class="header-content">
            <h1 class="page-title">Specific Reports</h1>
          </div>
        </header>

        <!-- Reports Overview -->
        <div class="reports-overview">
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-icon">
                <i class="fas fa-flag"></i>
              </div>
              <div class="stat-content">
                <div class="stat-value" id="totalReports">0</div>
                <div class="stat-label">Total Reports</div>
                <div class="stat-change positive">All submitted reports</div>
              </div>
            </div>

            <div class="stat-card">
              <div class="stat-icon">
                <i class="fas fa-clock"></i>
              </div>
              <div class="stat-content">
                <div class="stat-value" id="pendingReports">0</div>
                <div class="stat-label">Pending Review</div>
                <div class="stat-change negative">Awaiting action</div>
              </div>
            </div>

            <div class="stat-card">
              <div class="stat-icon">
                <i class="fas fa-check-circle"></i>
              </div>
              <div class="stat-content">
                <div class="stat-value" id="resolvedReports">0</div>
                <div class="stat-label">Resolved</div>
                <div class="stat-change positive">Successfully handled</div>
              </div>
            </div>

            <div class="stat-card">
              <div class="stat-icon">
                <i class="fas fa-triangle-exclamation"></i>
              </div>
              <div class="stat-content">
                <div class="stat-value" id="highPriorityReports">0</div>
                <div class="stat-label">High Priority</div>
                <div class="stat-change positive">Needs quick attention</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Reports Section -->
        <div class="reports-section">
          <div class="section-header">
            <div>
              <h3 class="section-title">All Reports</h3>
              <p class="section-subtitle">
                Review, search, and filter submitted reports
              </p>
            </div>

            <div class="filter-controls">
              <div class="filter-field search-field">
                <i class="fas fa-search"></i>
                <input
                  type="text"
                  class="form-control search-input"
                  placeholder="Search reports..."
                  id="reportSearch"
                />
              </div>

              <select class="form-select compact-select" id="statusFilter">
                <option value="">All Status</option>
                <option value="pending">Pending</option>
                <option value="reviewed">Reviewed</option>
                <option value="resolved">Resolved</option>
                <option value="closed">Closed</option>
              </select>

              <select class="form-select compact-select" id="categoryFilter">
                <option value="">All Categories</option>
                <option value="vehicle">Vehicle Issue</option>
                <option value="behavior">User Behavior</option>
                <option value="payment">Payment Issue</option>
                <option value="app">App Bug</option>
                <option value="safety">Safety Concern</option>
              </select>
            </div>
          </div>

          <div class="table-responsive">
            <table class="table reports-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Subject Topic</th>
                  <th>Category</th>
                  <th>Reported Role</th>
                  <th>Date Created</th>
                  <th>Status</th>
                  <th>Priority</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                <!-- Loaded dynamically from /reports/list -->
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <script src="js/sidebar.js"></script>
    <script src="js/report-view.js"></script>
  </body>
</html>
