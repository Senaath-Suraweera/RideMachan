<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Messages - RideMachan</title>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/sidebar.css" />
    <link rel="stylesheet" href="css/messages.css" />
  </head>
  <body>
    <!-- Sidebar will be injected by sidebar.js -->

    <div class="main-content">
      <div class="messages-container">
        <!-- Header -->
        <div class="messages-header">
          <h1 class="page-title">
            <i class="fas fa-comments"></i>
            Messages
          </h1>
          <button class="btn btn-primary" id="newConversationBtn">
            <i class="fas fa-plus"></i>
            New Conversation
          </button>
        </div>

        <!-- Main messaging layout -->
        <div class="messaging-layout">
          <!-- Conversations Sidebar -->
          <div class="conversations-sidebar">
            <div class="conversations-header">
              <div class="search-box">
                <i class="fas fa-search"></i>
                <input
                  type="text"
                  id="conversationSearch"
                  placeholder="Search conversations..."
                />
              </div>
            </div>

            <div class="conversations-list" id="conversationsList">
              <!-- Conversations will be loaded here -->
              <div class="loading-state">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Loading conversations...</p>
              </div>
            </div>
          </div>

          <!-- Chat Area -->
          <div class="chat-area" id="chatArea">
            <div class="no-conversation-selected">
              <i class="fas fa-comments"></i>
              <h3>Select a conversation</h3>
              <p>Choose a conversation from the sidebar or start a new one</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- New Conversation Modal -->
    <div class="modal" id="newConversationModal">
      <div class="modal-overlay"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h2>New Conversation</h2>
          <button class="modal-close" id="closeModalBtn">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label">Select User Type</label>
            <select class="form-select" id="userTypeSelect">
              <option value="">-- Select Type --</option>
              <option value="CUSTOMER">Customer</option>
              <option value="DRIVER">Driver</option>
              <option value="COMPANY">Rental Company</option>
              <option value="ADMIN">Admin</option>
              <option value="MAINTENANCE">Maintenance Staff</option>
              <option value="PROVIDER">Vehicle Provider</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Select User</label>
            <select class="form-select" id="userSelect">
              <option value="">-- Select a user type first --</option>
            </select>
          </div>

          <div class="modal-actions">
            <button class="btn btn-outline" id="cancelModalBtn">Cancel</button>
            <button class="btn btn-primary" id="startConversationBtn">
              <i class="fas fa-paper-plane"></i>
              Start Conversation
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="js/sidebar.js"></script>
    <script src="js/messages.js"></script>
  </body>
</html>
