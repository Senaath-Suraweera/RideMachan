<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile - RideMachan</title>

    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/sidebar.css" />
    <link rel="stylesheet" href="../css/provider-profile.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <div class="main-content">
        <div class="page-header">
          <h1>My Profile</h1>
          <div class="header-actions">
            <button class="btn btn-outline" id="backBtn">Back</button>
            <button class="btn btn-primary" id="saveBtn">Save Changes</button>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <h2>Provider Details</h2>
            <p>Update your personal and contact information</p>
          </div>

          <div class="form-grid">
            <div class="form-group">
              <label>Username</label>
              <input id="username" type="text" class="input" />
            </div>

            <div class="form-group">
              <label>Email</label>
              <input
                id="email"
                type="email"
                class="input input-readonly"
                readonly
              />
              <small class="field-hint">
                <i class="fas fa-lock"></i> Email cannot be changed
              </small>
            </div>

            <div class="form-group">
              <label>First Name</label>
              <input id="firstName" type="text" class="input" />
            </div>

            <div class="form-group">
              <label>Last Name</label>
              <input id="lastName" type="text" class="input" />
            </div>

            <div class="form-group">
              <label>Phone Number</label>
              <input id="phoneNumber" type="text" class="input" />
            </div>

            <div class="form-group">
              <label>Zip Code</label>
              <input id="zipCode" type="text" class="input" />
            </div>

            <div class="form-group">
              <label>House Number</label>
              <input id="houseNumber" type="text" class="input" />
            </div>

            <div class="form-group">
              <label>Street</label>
              <input id="street" type="text" class="input" />
            </div>

            <div class="form-group">
              <label>City</label>
              <input id="city" type="text" class="input" />
            </div>
          </div>

          <div class="divider"></div>

          <div class="status-row">
            <div>
              <div class="muted">Provider ID</div>
              <div id="providerIdText" class="strong">-</div>
            </div>
          </div>

          <div class="toast" id="toast" style="display: none"></div>
        </div>

        <!-- ===================== Change Password Card ===================== -->
        <div class="card password-card">
          <div class="card-header">
            <h2>
              <i class="fas fa-shield-halved"></i>
              Change Password
            </h2>
            <p>Keep your account secure by updating your password regularly</p>
          </div>

          <div class="form-grid password-grid">
            <div class="form-group">
              <label>Current Password</label>
              <div class="password-wrapper">
                <input
                  id="currentPassword"
                  type="password"
                  class="input"
                  autocomplete="current-password"
                  placeholder="Enter your current password"
                />
                <button
                  type="button"
                  class="toggle-password"
                  data-target="currentPassword"
                  aria-label="Toggle password visibility"
                >
                  <i class="fas fa-eye"></i>
                </button>
              </div>
            </div>

            <div class="form-group password-spacer"></div>

            <div class="form-group">
              <label>New Password</label>
              <div class="password-wrapper">
                <input
                  id="newPassword"
                  type="password"
                  class="input"
                  autocomplete="new-password"
                  placeholder="At least 8 characters"
                />
                <button
                  type="button"
                  class="toggle-password"
                  data-target="newPassword"
                  aria-label="Toggle password visibility"
                >
                  <i class="fas fa-eye"></i>
                </button>
              </div>
              <div class="strength-meter" id="strengthMeter">
                <div class="strength-bar"><span></span></div>
                <small class="strength-label">Password strength</small>
              </div>
            </div>

            <div class="form-group">
              <label>Confirm New Password</label>
              <div class="password-wrapper">
                <input
                  id="confirmPassword"
                  type="password"
                  class="input"
                  autocomplete="new-password"
                  placeholder="Re-enter new password"
                />
                <button
                  type="button"
                  class="toggle-password"
                  data-target="confirmPassword"
                  aria-label="Toggle password visibility"
                >
                  <i class="fas fa-eye"></i>
                </button>
              </div>
              <small class="match-hint" id="matchHint"></small>
            </div>
          </div>

          <div class="password-actions">
            <button class="btn btn-primary" id="changePasswordBtn">
              <i class="fas fa-key"></i>
              Update Password
            </button>
          </div>

          <div class="toast" id="pwToast" style="display: none"></div>
        </div>
      </div>
    </div>

    <script src="../js/sidebar.js"></script>
    <script src="../js/provider-profile.js"></script>
  </body>
</html>
