<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ongoing Bookings - RideMachan</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/ongoing-bookings.css" />
    <link rel="stylesheet" href="../css/sidebar.css" />
  </head>
  <body class="has-sidebar">
    <div class="container">
      <!-- sidebar injected by sidebar.js -->
      <div class="main-content">
        <div class="page-header">
          <h1>Ongoing Bookings</h1>
        </div>
        <p class="page-subtitle">
          Manage and track your active vehicle rental bookings
        </p>

        <div class="search-filter-section">
          <!-- Filter Row -->
          <div class="filter-row">
            <div class="form-group">
              <label class="form-label">Vehicle Type</label>
              <select class="form-select" id="vehicleTypeFilter">
                <option>Select type</option>
                <option>Sedan</option>
                <option>SUV</option>
                <option>Hatchback</option>
                <option>Luxury</option>
                <option>Economy</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Location</label>
              <input
                type="text"
                class="form-control"
                placeholder="Enter location"
                id="locationFilter"
              />
            </div>
            <div class="form-group">
              <label class="form-label">From</label>
              <input type="date" class="form-control" id="fromDate" />
            </div>
            <div class="form-group">
              <label class="form-label">To</label>
              <input type="date" class="form-control" id="toDate" />
            </div>
          </div>

          <!-- Filter Chips -->
          <div class="filter-options" id="filterOptions">
            <label class="filter-chip">
              <input type="checkbox" id="withDriver" />
              <i class="fas fa-user-tie"></i> With Driver
            </label>
            <label class="filter-chip">
              <input type="checkbox" id="accepted" />
              <i class="fas fa-circle-check"></i> Accepted
            </label>
            <label class="filter-chip">
              <input type="checkbox" id="pickedUp" />
              <i class="fas fa-key"></i> Picked Up
            </label>
            <label class="filter-chip">
              <input type="checkbox" id="paid" />
              <i class="fas fa-credit-card"></i> Paid
            </label>
          </div>

          <!-- Actions Row -->
          <div class="filter-actions">
            <div class="filter-actions-left">
              <button class="btn btn-primary" onclick="applyFilters()">
                <i class="fas fa-magnifying-glass"></i> Search
              </button>
              <button
                class="btn filter-toggle"
                id="filterToggleBtn"
                onclick="toggleFilters(this)"
              >
                <i class="fas fa-sliders"></i> Hide Filters
              </button>
            </div>
            <div class="sort-controls">
              <span class="sort-label">Sort by</span>
              <select class="form-select" id="sortSelect">
                <option>Descending</option>
                <option>Ascending</option>
                <option>Date (Newest)</option>
                <option>Date (Oldest)</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Bookings List -->
        <div class="bookings-container">
          <div style="padding: 16px; color: #6b7280">Loading bookings…</div>
        </div>

        <!-- Pagination -->
        <nav
          class="pagination-section"
          id="paginationSection"
          aria-label="Bookings pagination"
          style="display: none"
        >
          <div class="pagination-info" id="paginationInfo"></div>
          <ul class="pagination" id="paginationList"></ul>
        </nav>
      </div>
      <!-- /.main-content -->
    </div>
    <!-- /.container -->

    <!-- Status Update Modal -->
    <div class="modal-overlay" id="statusUpdateModal">
      <div class="modal">
        <div class="modal-header">
          <h2>Update Booking Status</h2>
          <button class="modal-close" onclick="closeStatusModal()">
            <i class="fas fa-xmark"></i>
          </button>
        </div>
        <div class="modal-body">
          <div class="form-group" style="margin-bottom: 0">
            <label class="form-label">New Status</label>
            <select class="form-select" id="newStatus">
              <option value="accepted">Accepted</option>
              <option value="pickup-ready">Ready for Pickup</option>
              <option value="in-progress">In Progress</option>
              <option value="completed">Completed</option>
              <option value="cancelled">Cancelled</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button
            type="button"
            class="btn btn-secondary"
            onclick="closeStatusModal()"
          >
            Cancel
          </button>
          <button
            type="button"
            class="btn btn-primary"
            onclick="confirmStatusUpdate()"
          >
            Confirm
          </button>
        </div>
      </div>
    </div>

    <script src="../js/sidebar.js"></script>
    <script src="../js/ongoing-bookings.js"></script>
  </body>
</html>
