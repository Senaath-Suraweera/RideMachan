<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Earnings - RideMachan</title>
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/sidebar.css" />
    <link rel="stylesheet" href="../css/earnings.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <div class="main-content">
        <div class="page-header">
          <div>
            <h1>Earnings</h1>
            <p class="page-subtitle">
              Track your vehicle rental income and performance
            </p>
          </div>
        </div>

        <!-- Stats Cards -->
        <div class="stats-grid">
          <div class="stat-card income">
            <div class="stat-icon">
              <i class="fas fa-wallet"></i>
            </div>
            <div class="stat-content">
              <div class="stat-value">Rs 342,500</div>
              <div class="stat-label">Total Income</div>
              <div class="stat-change positive">+ 19.2% from last month</div>
            </div>
          </div>
          <div class="stat-card bookings">
            <div class="stat-icon">
              <i class="fas fa-calendar-check"></i>
            </div>
            <div class="stat-content">
              <div class="stat-value">156</div>
              <div class="stat-label">Total Bookings</div>
              <div class="stat-change positive">+ 8 from last month</div>
            </div>
          </div>
        </div>

        <!-- Chart Section -->
        <div class="chart-section">
          <div class="chart-card">
            <div class="card-header chart-header">
              <div>
                <h2>Monthly Income Graph</h2>
                <p>Your earnings over the past 12 months</p>
              </div>
              <div class="chart-controls">
                <select class="form-select" id="chartPeriod">
                  <option>Last 12 months</option>
                  <option>Last 6 months</option>
                  <option>Last 3 months</option>
                  <option>This year</option>
                </select>
              </div>
            </div>
            <div class="chart-container">
              <canvas id="earningsChart"></canvas>
            </div>
          </div>
        </div>

        <!-- Vehicle Performance and Bookings -->
        <div class="earnings-grid">
          <div class="vehicle-earnings-section">
            <div class="card">
              <div class="card-header">
                <h2>Vehicle Earnings</h2>
                <div class="sort-control">
                  <select class="form-select" id="vehicleSortSelect">
                    <option>Sort</option>
                    <option>Earnings (High to Low)</option>
                    <option>Earnings (Low to High)</option>
                    <option>Bookings (Most to Least)</option>
                    <option>Name (A-Z)</option>
                  </select>
                </div>
              </div>
              <div class="vehicle-earnings-list">
                <!-- populated by JS -->
              </div>
            </div>
          </div>

          <div class="recent-bookings-section">
            <div class="card">
              <div class="card-header">
                <h2>Recent Bookings</h2>
              </div>
              <div class="bookings-list">
                <!-- populated by JS -->
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="../js/sidebar.js"></script>
    <script src="../js/earnings.js"></script>
  </body>
</html>
