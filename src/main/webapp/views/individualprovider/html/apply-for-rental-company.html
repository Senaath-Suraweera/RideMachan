<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apply for Rental Company - RideMachan</title>
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/sidebar.css" />
    <link rel="stylesheet" href="../css/apply-rental-company.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <div class="main-content">
        <div class="page-header">
          <h1>Apply for Rental Company</h1>
        </div>

        <!-- Search and Filter Section -->
        <div class="search-filter-section">
          <div class="filter-row">
            <div class="form-group">
              <label class="form-label">Company Name</label>
              <input
                type="text"
                class="form-control"
                placeholder="Enter company name"
                id="companyNameFilter"
              />
            </div>
            <div class="form-group">
              <label class="form-label">Location</label>
              <input
                type="text"
                class="form-control"
                placeholder="Enter location"
                id="locationFilter"
              />
            </div>
            <div class="form-group">
              <label class="form-label">Rating Filter</label>
              <select class="form-select" id="ratingFilter">
                <option>All ratings</option>
                <option>5 Stars</option>
                <option>4+ Stars</option>
                <option>3+ Stars</option>
                <option>2+ Stars</option>
              </select>
            </div>
          </div>
          <div class="filter-options">
            <label class="checkbox-label">
              <input type="checkbox" id="withDriverFilter" /> With driver
            </label>
          </div>
          <div class="search-actions">
            <button class="btn btn-primary" onclick="searchCompanies()">
              🔍 Search
            </button>
            <select class="form-select sort-select" id="sortSelect">
              <option>Sort by Rating</option>
              <option>Sort by Name (A-Z)</option>
              <option>Sort by Name (Z-A)</option>
              <option>Sort by Location</option>
              <option>Sort by Reviews</option>
            </select>
          </div>
        </div>

        <!-- Companies List -->
        <div class="companies-container"></div>

        <!-- Load More Button -->
        <div class="load-more-section">
          <button class="btn btn-secondary" onclick="loadMoreCompanies()">
            Load More Companies
          </button>
        </div>
      </div>
    </div>

    <!-- Company Detail Modal -->
    <div class="company-detail-overlay" id="companyDetailOverlay">
      <div class="company-detail-card">
        <div class="company-detail-header">
          <h2>Company Details</h2>
          <button
            class="company-detail-close"
            onclick="closeCompanyDetailModal()"
          >
            ×
          </button>
        </div>
        <div class="company-detail-body">
          <!-- Content loaded dynamically -->
        </div>
        <div class="company-detail-footer">
          <button class="btn btn-secondary" onclick="closeCompanyDetailModal()">
            Close
          </button>
          <button class="btn btn-primary">Apply Now</button>
        </div>
      </div>
    </div>

    <!-- Application Modal -->
    <div class="modal-overlay" id="applicationModal">
      <div class="modal">
        <div class="modal-header">
          <h2>Apply to <span id="modalCompanyName">Company</span></h2>
          <button class="modal-close" onclick="closeApplicationModal()">
            ×
          </button>
        </div>
        <div class="modal-body">
          <form id="applicationForm">
            <div class="form-section">
              <h3>Personal Information</h3>
              <div class="form-row">
                <div class="form-group">
                  <label>Provider Name</label>
                  <input
                    id="providerName"
                    name="providerName"
                    type="text"
                    readonly
                  />
                </div>

                <div class="form-group">
                  <label>Provider Email</label>
                  <input
                    id="providerEmail"
                    name="providerEmail"
                    type="email"
                    readonly
                  />
                </div>

                <div class="form-group">
                  <label>Provider Phone</label>
                  <input
                    id="providerPhone"
                    name="providerPhone"
                    type="text"
                    readonly
                  />
                </div>

                <input id="providerIdDisplay" type="hidden" />
              </div>
            </div>

            <div class="form-section">
              <h3>Vehicle Information</h3>
              <div class="form-group">
                <label class="form-label"
                  >Select Vehicle to Register (Choose One)
                  <span style="color: red">*</span></label
                >
                <div class="vehicle-selection"></div>
              </div>
            </div>

            <div class="form-section">
              <h3>Additional Information</h3>
              <div class="form-group">
                <label class="form-label">Years of Experience</label>
                <select
                  class="form-select"
                  name="experience"
                  id="experience"
                  required
                >
                  <option value="">Select experience</option>
                  <option value="1-2">1-2 years</option>
                  <option value="3-5">3-5 years</option>
                  <option value="5+">5+ years</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Message (Optional)</label>
                <textarea
                  class="form-control"
                  name="message"
                  id="message"
                  rows="4"
                  placeholder="Tell us why you want to join this company..."
                ></textarea>
              </div>
              <div class="form-group">
                <label class="checkbox-label">
                  <input type="checkbox" name="terms" id="terms" required />
                  I agree to the terms and conditions
                </label>
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button
            type="button"
            class="btn btn-secondary"
            onclick="closeApplicationModal()"
          >
            Cancel
          </button>
          <button type="submit" form="applicationForm" class="btn btn-primary">
            Submit Application
          </button>
        </div>
      </div>
    </div>

    <script src="../js/sidebar.js"></script>
    <script src="../js/apply-rental-company.js"></script>
  </body>
</html>
