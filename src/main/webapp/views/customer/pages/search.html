<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search - Ride Machan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/main.css?v=5" />
    <link rel="stylesheet" href="../css/search.css?v=5" />
</head>
<body>
    <div class="container">
        <!-- Include Sidebar Navigation -->
        <div id="navbar-container"></div>

        <!-- Include Header -->
        <div id="header-container"></div>

        <!-- Main Content -->
        <div class="main-content">

            <!-- Search Form -->
            <div class="search-form-container">
                <div class="form-header">
                    <div class="form-title-section">
                        <h2><i class="fas fa-search-location"></i> Find Your Perfect Vehicle</h2>
                        <p class="subtitle">Search and filter through vehicles across Sri Lanka</p>
                    </div>
                </div>

                <div class="search-form">
                    <!-- Row 1 (2 columns) -->
                    <div class="form-row-grid">
                        <div class="form-group">
                            <label for="vehicleType"><i class="fas fa-car"></i> Vehicle Type</label>
                            <select class="form-control" id="vehicleType">
                                <option value="">All Types</option>
                                <option value="car">Car</option>
                                <option value="suv">SUV</option>
                                <option value="van">Van</option>
                                <option value="truck">Truck</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="pickupLocation"><i class="fas fa-map-marker-alt"></i> Pickup Location</label>
                            <select class="form-control" id="pickupLocation">
                                <option value="">All Locations</option>
                                <option value="colombo">Colombo</option>
                                <option value="kandy">Kandy</option>
                                <option value="galle">Galle</option>
                                <option value="negombo">Negombo</option>
                                <option value="jaffna">Jaffna</option>
                                <option value="trincomalee">Trincomalee</option>
                                <option value="anuradhapura">Anuradhapura</option>
                                <option value="matara">Matara</option>
                            </select>
                        </div>
                    </div>

                    <!-- Row 2 (3 columns) -->
                    <div class="form-row-grid three-columns">
                        <div class="form-group">
                            <label for="priceRange"><i class="fas fa-money-bill-wave"></i> Price Range</label>
                            <select class="form-control" id="priceRange">
                                <option value="">All Prices</option>
                                <option value="0-5000">LKR 0 - 5,000</option>
                                <option value="5000-10000">LKR 5,000 - 10,000</option>
                                <option value="10000-15000">LKR 10,000 - 15,000</option>
                                <option value="15000+">LKR 15,000+</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="fuelType"><i class="fas fa-gas-pump"></i> Fuel Type</label>
                            <select class="form-control" id="fuelType">
                                <option value="">All Fuel Types</option>
                                <option value="petrol">Petrol</option>
                                <option value="diesel">Diesel</option>
                                <option value="hybrid">Hybrid</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="seats"><i class="fas fa-users"></i> Seats</label>
                            <select class="form-control" id="seats">
                                <option value="">Any</option>
                                <option value="2">2</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                                <option value="7">7</option>
                                <option value="7+">7+</option>
                            </select>
                        </div>
                    </div>

                    <!-- Row 3 (2 columns) -->
                    <div class="form-row-grid">
                        <div class="form-group">
                            <label for="vehicleCategoryFilter"><i class="fas fa-layer-group"></i> Category</label>
                            <select class="form-control" id="vehicleCategoryFilter">
                                <option value="">All Categories</option>
                                <option value="car">Car</option>
                                <option value="suv">SUV</option>
                                <option value="van">Van</option>
                                <option value="truck">Truck</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="companyFilter"><i class="fas fa-building"></i> Company</label>
                            <select class="form-control" id="companyFilter">
                                <option value="">All Companies</option>
                                <option value="Premium Rentals">Premium Rentals</option>
                                <option value="City Car Rentals">City Car Rentals</option>
                                <option value="Budget Wheels">Budget Wheels</option>
                                <option value="Lanka Van Hire">Lanka Van Hire</option>
                                <option value="Luxury Rides LK">Luxury Rides LK</option>
                                <option value="Island Transport">Island Transport</option>
                            </select>
                        </div>
                    </div>

                    <!-- Actions -->
                    <div class="form-actions">
                        <button class="search-btn primary" onclick="performSearch(); applyFilters();" type="button">
                            <i class="fas fa-search"></i>
                            <span>Search</span>
                        </button>
                        <button class="search-btn secondary" onclick="clearAllFilters()" type="button">
                            <i class="fas fa-times"></i>
                            <span>Clear</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Search Results -->
            <div class="search-results" id="searchResults">
                <!-- Results will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Load searchVehicles.js -->
    <script src="../js/searchVehicles.js"></script>

    <script>
        // Load external components
        function loadComponent(elementId, filePath, callback) {
            fetch(filePath)
                .then(response => response.text())
                .then(data => {
                    // Replace the PAGE_TITLE placeholder with SEARCH
                    if (elementId === 'header-container') {
                        data = data.replace('{{PAGE_TITLE}}', 'SEARCH');
                    }
                    
                    document.getElementById(elementId).innerHTML = data;
                    // Execute any scripts in the loaded content (handles inline script tags)
                    executeComponentScripts(elementId);
                    
                    // Execute callback if provided
                    if (callback) {
                        callback();
                    }
                })
                .catch(error => console.error('Error loading component:', error));
        }

        // Execute scripts inside a loaded component container by creating new script nodes
        function executeComponentScripts(containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;

            const scripts = container.querySelectorAll('script');
            scripts.forEach(oldScript => {
                const newScript = document.createElement('script');
                if (oldScript.src) {
                    newScript.src = oldScript.src;
                } else {
                    newScript.textContent = oldScript.textContent;
                }
                document.body.appendChild(newScript);
                // Remove the old script tag to avoid duplication
                oldScript.parentNode && oldScript.parentNode.removeChild(oldScript);
            });
        }

        // Load navbar and header on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadComponent('navbar-container', '../components/navbar.html', function() {
                // Initialize navbar after it's loaded
                if (typeof initializeNavbar === 'function') initializeNavbar();
            });

            loadComponent('header-container', '../components/header.html', function() {
                // Initialize header after it's loaded
                if (typeof initializeHeader === 'function') initializeHeader();
            });

            // NOTE: Date/time defaults removed because the search form no longer contains those fields.
        });

        // Current active tab
        let currentTab = 'vehicles';


        function switchTab(tab) {
            if (tab === 'drivers') {
                window.location.href = "driver_search.html";
                return;
            }

            currentTab = tab;
            
            // Update tab UI
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            const btn = document.querySelector(`[data-tab="${tab}"]`);
            if (btn) btn.classList.add('active');
            
            // Update search button text
            const searchBtnText = document.getElementById('searchBtnText');
            searchBtnText.textContent = tab === 'drivers' ? 'Search Drivers' : 'Search Vehicles';
            
            // Clear results when switching tabs
            document.getElementById('searchResults').innerHTML = '';
        }

        function performSearch() {
            if (currentTab === 'drivers') {
                window.location.href = "driver_search.html";
            } else {
                searchVehicles();
            }
        }


        // Header functionality (integrated from header.html)
        function initializeHeader() {
            setTimeout(() => {
                const userName = document.getElementById('userName');
                const profileInitial = document.getElementById('profileInitial');
                
                if (userName) userName.textContent = 'Kamal';
                if (profileInitial) profileInitial.textContent = 'K';
                
                updateNotificationCounts();
            }, 100);
        }

        function updateNotificationCounts() {
            setTimeout(() => {
                const notificationCount = document.getElementById('notificationCount');
                const messageCount = document.getElementById('messageCount');
                
                if (notificationCount) notificationCount.textContent = '3';
                if (messageCount) messageCount.textContent = '5';
            }, 100);
        }

        function toggleProfileDropdown() {
            const dropdown = document.getElementById('profileDropdown');
            if (dropdown) {
                dropdown.classList.toggle('show');
            }
        }

        function showNotifications() {
            alert('Notifications: You have 3 new notifications!');
        }

        function showMessages() {
            alert('Messages: You have 5 new messages!');
        }

        function handleLogout() {
            if (confirm('Are you sure you want to logout?')) {
                alert('Logged out successfully!');
                // In a real app: window.location.href = '../auth/login.html';
            }
        }

        // Navbar functionality (integrated from navbar.html)
        function initializeNavbar() {
            setTimeout(() => {
                setActiveNavItem('search');
            }, 100);
        }

        function setActiveNavItem(pageName) {
            setTimeout(() => {
                document.querySelectorAll('.nav-item').forEach(item => {
                    item.classList.remove('active');
                });
                
                const activeItem = document.querySelector(`[data-page="${pageName}"]`);
                if (activeItem) {
                    activeItem.classList.add('active');
                }
            }, 100);
        }

        // Initialize everything when page loads
        window.addEventListener('load', function() {
            initializeNavbar();
        });

        // Close dropdowns when clicking outside
        document.addEventListener('click', function(event) {
            setTimeout(() => {
                const dropdown = document.getElementById('profileDropdown');
                const profile = document.querySelector('.user-profile');
                
                if (dropdown && profile && !profile.contains(event.target)) {
                    dropdown.classList.remove('show');
                }
            }, 100);
        });
    </script>
</body>
</html>
