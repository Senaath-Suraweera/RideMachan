<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search - Ride Machan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/main.css?v=5" />
    <link rel="stylesheet" href="../css/search.css?v=5" />
</head>
<body>
<div class="container">
    <!-- Include Sidebar Navigation -->
    <div id="navbar-container"></div>

    <!-- Include Header -->
    <div id="header-container"></div>

    <!-- Main Content -->
    <div class="main-content">

        <!-- Search Form -->
        <div class="search-form-container">
            <div class="form-header">
                <div class="form-title-section">
                    <h2><i class="fas fa-search-location"></i> Find Your Perfect Vehicle</h2>
                    <p class="subtitle">Search and filter through vehicles across Sri Lanka</p>
                </div>
            </div>

            <div class="search-form">
                <!-- Row 1: Vehicle Type, Fuel Type, Seats -->
                <div class="form-row-grid three-columns">
                    <div class="form-group">
                        <label for="vehicleType"><i class="fas fa-car"></i> Vehicle Type</label>
                        <select class="form-control" id="vehicleType">
                            <option value="">All Types</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="fuelType"><i class="fas fa-gas-pump"></i> Fuel Type</label>
                        <select class="form-control" id="fuelType">
                            <option value="">All Fuel Types</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="seats"><i class="fas fa-users"></i> Seats</label>
                        <select class="form-control" id="seats">
                            <option value="">Any</option>
                        </select>
                    </div>
                </div>

                <!-- Row 2: Price Range + Company + Pickup Location -->
                <div class="form-row-grid">
                    <!-- Left: Price Range Slider -->
                    <div class="form-group price-slider-group">
                        <label><i class="fas fa-money-bill-wave"></i> Price Range (per day)</label>
                        <div class="price-slider-container">
                            <div class="price-labels">
                                <span class="price-min-label">Rs 0</span>
                                <span class="price-value-from">Rs <span id="priceValueFrom">0</span></span>
                                <span class="price-value-to">Rs <span id="priceValueTo">100000</span></span>
                                <span class="price-max-label">Rs 100,000</span>
                            </div>
                            <div class="slider-wrapper">
                                <div class="slider-track"></div>
                                <div class="slider-range" id="sliderRange"></div>
                                <input type="range" id="priceMin" min="0" max="100000" value="0" step="1000" class="slider-input">
                                <input type="range" id="priceMax" min="0" max="100000" value="100000" step="1000" class="slider-input">
                            </div>
                            <div class="price-inputs">
                                <div class="price-input-group">
                                    <label>From (Rs)</label>
                                    <input type="number" id="priceFromInput" value="0" min="0" max="100000" step="1000" class="price-input">
                                </div>
                                <div class="price-input-group">
                                    <label>To (Rs)</label>
                                    <input type="number" id="priceToInput" value="100000" min="0" max="100000" step="1000" class="price-input">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Right: Company + Pickup Location stacked -->
                    <div class="form-group-stacked">
                        <div class="form-group">
                            <label for="companyFilter"><i class="fas fa-building"></i> Company</label>
                            <select class="form-control" id="companyFilter">
                                <option value="">All Companies</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="pickupLocation"><i class="fas fa-map-marker-alt"></i> Pickup Location</label>
                            <select class="form-control" id="pickupLocation">
                                <option value="">All Locations</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Actions -->
                <div class="form-actions">
                    <button class="search-btn primary" onclick="performSearch(); applyFilters();" type="button">
                        <i class="fas fa-search"></i>
                        <span>Search</span>
                    </button>
                    <button class="search-btn secondary" onclick="clearAllFilters()" type="button">
                        <i class="fas fa-times"></i>
                        <span>Clear</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Search Results -->
        <div class="search-results" id="searchResults">
            <!-- Results populated by searchVehicles.js -->
        </div>
    </div>
</div>

<!-- Main JS -->
<script src="../js/searchVehicles.js"></script>

<script>
    // ── Component loader ──
    // Returns a Promise so callers can wait for all scripts (incl. external src)
    // to finish loading before running the callback.
    function loadComponent(elementId, filePath, callback) {
        fetch(filePath)
            .then(r => r.text())
            .then(html => {
                if (elementId === 'header-container') {
                    html = html.replace('{{PAGE_TITLE}}', 'SEARCH');
                }
                document.getElementById(elementId).innerHTML = html;
                // Wait for all scripts inside the component to fully load
                // (critical for header.js which is loaded via <script src="...">)
                executeComponentScripts(elementId).then(() => {
                    if (callback) callback();
                });
            })
            .catch(err => console.error('Error loading component:', err));
    }

    function executeComponentScripts(containerId) {
        const container = document.getElementById(containerId);
        if (!container) return Promise.resolve();

        const scriptPromises = [];

        container.querySelectorAll('script').forEach(oldScript => {
            const newScript = document.createElement('script');

            if (oldScript.src) {
                // External script — must wait for onload before callback fires
                const p = new Promise((resolve) => {
                    newScript.onload  = resolve;
                    newScript.onerror = resolve; // resolve even on error, don't block UI
                });
                newScript.src = oldScript.src;
                scriptPromises.push(p);
            } else {
                // Inline script — runs synchronously on append, no waiting needed
                newScript.textContent = oldScript.textContent;
            }

            document.body.appendChild(newScript);
            if (oldScript.parentNode) oldScript.parentNode.removeChild(oldScript);
        });

        return Promise.all(scriptPromises);
    }

    document.addEventListener('DOMContentLoaded', function () {
        // Load navbar
        loadComponent('navbar-container', '../components/navbar.html', function () {
            if (typeof initializeNavbar === 'function') initializeNavbar();
        });

        // Load header — header.js inside it will call /customer/profile/info automatically
        // DO NOT override userName/profileInitial/notificationCount here
        loadComponent('header-container', '../components/header.html', function () {
            if (typeof initializeHeader === 'function') initializeHeader();
        });
    });

    // ── Tab switching ──
    let currentTab = 'vehicles';

    function switchTab(tab) {
        if (tab === 'drivers') { window.location.href = 'driver_search.html'; return; }
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        const btn = document.querySelector(`[data-tab="${tab}"]`);
        if (btn) btn.classList.add('active');
        document.getElementById('searchResults').innerHTML = '';
    }

    function performSearch() {
        if (currentTab === 'drivers') { window.location.href = 'driver_search.html'; }
        else { searchVehicles(); }
    }

    // ── Navbar helpers ──
    function initializeNavbar() {
        setTimeout(() => setActiveNavItem('search'), 100);
    }

    function setActiveNavItem(pageName) {
        setTimeout(() => {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            const active = document.querySelector(`[data-page="${pageName}"]`);
            if (active) active.classList.add('active');
        }, 100);
    }

    window.addEventListener('load', initializeNavbar);

    // ── Company profile navigation ──
    function viewCompanyProfile(cardElement) {
        const companyId = cardElement.getAttribute('data-company-id');
        if (!companyId) return;
        window.location.href = `company-profile.html?companyId=${encodeURIComponent(companyId)}`;
    }
</script>
</body>
</html>
