<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vehicle Details - Ride Machan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/vehicle-profile.css" />
</head>
<body>
<div class="container">
    <!-- Sidebar Navigation -->
    <div id="navbar-container"></div>

    <!-- Header -->
    <div id="header-container"></div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="back-to-search">
            <i class="fas fa-arrow-left"></i>
            <span onclick="goBack()">Back to Search</span>
        </div>

        <div class="vehicle-details-container">
            <!-- Left Section -->
            <div class="left-section">
                <!-- Vehicle Info -->
                <div class="vehicle-info">
                    <div class="vehicle-header">
                        <!-- Vehicle image: real image from backend, fallback to icon -->
                        <div class="vehicle-image-large" id="vehicleImageContainer">
                            <i class="fas fa-car" id="vehicleImageFallback"></i>
                            <img id="vehicleImage"
                                 alt="Vehicle"
                                 style="display:none; width:100%; height:100%; object-fit:cover; border-radius:inherit;"
                                 onerror="this.style.display='none'; document.getElementById('vehicleImageFallback').style.display='flex';" />
                        </div>
                        <div class="vehicle-basic-info">
                            <h2 id="vehicleName">Loading...</h2>
                            <div class="vehicle-company" id="vehicleCompany" onclick="viewCompany()">Loading...</div>
                            <div class="vehicle-location" id="vehicleLocation">Loading...</div>
                            <div class="vehicle-rating">
                                <!-- Stars wired dynamically by updateStars('vehicleStars', rating) -->
                                <div class="stars" id="vehicleStars"></div>
                                <span class="rating-text" id="ratingText">Loading...</span>
                            </div>
                        </div>
                    </div>

                    <div class="vehicle-meta" id="vehicleMeta">
                        <!-- Populated dynamically -->
                    </div>

                    <!-- Key Features -->
                    <div class="key-features">
                        <h3>Key Features</h3>
                        <div class="features-list">
                            <!-- Populated dynamically -->
                        </div>
                    </div>
                </div>

                <!-- Rating and Reviews -->
                <div class="rating-reviews">
                    <h3>Rating and Reviews</h3>
                    <div class="overall-rating">
                        <div class="rating-score" id="overallRating">—</div>
                        <div class="rating-breakdown">
                            <!-- Stars wired dynamically by updateStars('reviewStars', rating) -->
                            <div class="rating-stars" id="reviewStars"></div>
                            <div class="rating-summary" id="ratingSummary">Loading reviews...</div>
                        </div>
                    </div>

                    <!-- Review cards rendered dynamically -->
                    <div id="reviewsList"></div>
                </div>
            </div>

            <!-- Right Section -->
            <div class="right-section">
                <!-- Booking Card -->
                <div class="booking-card">
                    <h3>Book This Vehicle</h3>
                    <div class="rate-info">
                        <div class="rate-label">Starting from</div>
                        <div class="price" id="vehiclePrice">Loading...<span class="price-period">/hour</span></div>
                    </div>

                    <div class="availability-status available" id="availabilityStatus">
                        <i class="fas fa-check-circle"></i>
                        <span>Available Now</span>
                    </div>

                    <div class="availability-text" id="availabilityText">
                        Next available: Immediately
                    </div>

                    <button class="btn btn-primary" onclick="bookVehicle()">
                        <i class="fas fa-calendar-plus"></i>
                        Book Now
                    </button>

                    <button class="btn btn-outline" onclick="messageOwner()">
                        <i class="fas fa-comment"></i>
                        Message Owner
                    </button>

                    <button class="btn btn-outline" id="wishlistBtn" onclick="toggleWishlist()">
                        <i class="far fa-heart"></i>
                        Add to Wishlist
                    </button>
                </div>
            </div>
            <!-- License Requirements block removed as requested -->
        </div>
    </div>
</div>

<script>
    async function loadComponents() {
        try {
            // Load navbar
            const navbarResponse = await fetch('../components/navbar.html');
            const navbarHtml = await navbarResponse.text();
            document.getElementById('navbar-container').innerHTML = navbarHtml;

            // Load header
            const headerResponse = await fetch('../components/header.html');
            const headerHtml = await headerResponse.text();
            document.getElementById('header-container').innerHTML = headerHtml;

            // header.js is injected via <script src> inside header.html —
            // wait one tick then call initializeHeader so the DOM is settled
            setTimeout(() => {
                if (typeof initializeHeader === 'function') {
                    initializeHeader();
                }
                // Set the page title via the header component
                if (typeof setPageTitle === 'function') {
                    setPageTitle('Vehicle Profile');
                }
            }, 0);

        } catch (error) {
            console.error('Error loading components:', error);
        }
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadComponents);
    } else {
        loadComponents();
    }
</script>
<script src="../js/vehicle-profile.js"></script>
</body>
</html>
