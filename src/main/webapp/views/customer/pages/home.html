<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | Ride Machan</title>

    <!-- Fonts & Icons -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet" />

    <!-- Global Styles -->
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/home.css" />
</head>

<body>
<div class="container">

    <!-- Navbar Component -->
    <div id="navbar-container"></div>

    <!-- Header Component -->
    <div id="header-container"></div>

    <!-- ================= MAIN CONTENT ================= -->
    <main class="main-content">

        <div class="page-title">
            <h2>Dashboard</h2>
        </div>

        <!-- Stats Cards -->
        <section class="stats-cards">

            <div class="stat-card" onclick="navigateToBookings('active')">
                <div class="card-header">
                    <div>
                        <span class="card-label">Active</span>
                        <span class="card-value" id="activeCount">0</span>
                    </div>
                    <div class="card-icon purple">
                        <i class="fas fa-car"></i>
                    </div>
                </div>
                <span class="card-change green">Currently Active</span>
            </div>

            <div class="stat-card" onclick="navigateToBookings('upcoming')">
                <div class="card-header">
                    <div>
                        <span class="card-label">Upcoming</span>
                        <span class="card-value" id="upcomingCount">0</span>
                    </div>
                    <div class="card-icon blue">
                        <i class="fas fa-clock"></i>
                    </div>
                </div>
                <span class="card-change positive">Scheduled Bookings</span>
            </div>

            <div class="stat-card" onclick="navigateToBookings('completed')">
                <div class="card-header">
                    <div>
                        <span class="card-label">Completed</span>
                        <span class="card-value" id="completedCount">0</span>
                    </div>
                    <div class="card-icon green">
                        <i class="fas fa-check"></i>
                    </div>
                </div>
                <span class="card-change">Total Rides</span>
            </div>

            <div class="stat-card" onclick="showSpendingDetails()">
                <div class="card-header">
                    <div>
                        <span class="card-label">This Month</span>
                        <span class="card-value" id="monthlySpend">LKR 0</span>
                    </div>
                    <div class="card-icon orange">
                        <i class="fas fa-chart-line"></i>
                    </div>
                </div>
                <span class="card-change positive">Total Spent</span>
            </div>

        </section>

        <!-- Quick Actions -->
        <section class="quick-actions">
            <h3>Quick Actions</h3>
            <div class="quick-actions-grid">
                <a href="../pages/search.html" class="action-btn">
                    <i class="fas fa-search"></i> Find Vehicle
                </a>
                <a href="../pages/bookings.html" class="action-btn outline">
                    <i class="fas fa-calendar"></i> View Bookings
                </a>
                <button class="action-btn outline" onclick="showEmergencyContact()">
                    <i class="fas fa-phone"></i> Emergency Help
                </button>
            </div>
        </section>

    </main>
</div>

<!-- ================= SCRIPTS ================= -->
<script>
    document.addEventListener("DOMContentLoaded", () => {
        loadComponents();
        loadDashboardData();
    });

    /* ---------- Load Navbar & Header ---------- */
    async function loadComponents() {
        const navbarHtml = await fetch("../components/navbar.html").then(r => r.text());
        const headerHtml = await fetch("../components/header.html").then(r => r.text());

        document.getElementById("navbar-container").innerHTML = navbarHtml;
        document.getElementById("header-container").innerHTML = headerHtml;

        await attachComponentScripts();
    }

    async function attachComponentScripts() {
        // Find script tags we just injected into containers
        const scripts = Array.from(document.querySelectorAll("#navbar-container script, #header-container script"));

        // Load them in sequence (inline scripts run immediately; external scripts awaited)
        for (const oldScript of scripts) {
            const newScript = document.createElement("script");

            // preserve type attribute if present
            if (oldScript.type) newScript.type = oldScript.type;

            // prefer the attribute value (preserves relative path)
            const srcAttr = oldScript.getAttribute("src");

            if (srcAttr) {
                // external script: set src and await load (preserve execution order)
                newScript.src = srcAttr;
                newScript.async = false;
                const p = new Promise((resolve) => {
                    newScript.onload = resolve;
                    newScript.onerror = resolve; // continue on error
                });
                document.body.appendChild(newScript);
                // remove the old script node to avoid duplicate execution
                oldScript.parentNode && oldScript.parentNode.removeChild(oldScript);
                await p;
            } else {
                // inline script: copy textContent and execute immediately (synchronous)
                newScript.textContent = oldScript.textContent;
                document.body.appendChild(newScript);
                oldScript.parentNode && oldScript.parentNode.removeChild(oldScript);
            }
        }

        // Fallback: if header didn't expose initializeHeader (maybe script path was wrong),
        // try loading the header script directly relative to this page.
        if (typeof initializeHeader !== "function") {
            try {
                await new Promise((resolve) => {
                    const s = document.createElement("script");
                    s.src = "../components/header.js";
                    s.async = false;
                    s.onload = resolve;
                    s.onerror = resolve;
                    document.body.appendChild(s);
                });
            } catch (e) {
                // ignore
            }
        }

        // Now that component scripts are executed/loaded, initialize header if available
        if (typeof initializeHeader === "function") {
            initializeHeader();
        }
    }

    /* ---------- Dashboard Data from Backend ---------- */
    async function loadDashboardData() {
        try {
            const response = await fetch('../../../customer/dashboard-stats');
            if (!response.ok) throw new Error('Failed');
            const data = await response.json();

            document.getElementById("activeCount").textContent = data.active;
            document.getElementById("upcomingCount").textContent = data.upcoming;
            document.getElementById("completedCount").textContent = data.completed;
            document.getElementById("monthlySpend").textContent =
                "LKR " + data.monthlySpending.toLocaleString();
        } catch (error) {
            console.error("Dashboard error:", error);
        }
    }
    /* ---------- Actions ---------- */
    function navigateToBookings(filter) {
        window.location.href = `../pages/bookings.html?filter=${filter}`;
    }

    function showSpendingDetails() {
        alert(
            "Monthly Spending Breakdown\n\n" +
            "Completed Rides: LKR 42,000\n" +
            "Cancellation Fees: LKR 2,500\n" +
            "Extra Services: LKR 1,250\n\n" +
            "Total: LKR 45,750"
        );
    }

    function showEmergencyContact() {
        alert(
            "Emergency Contacts\n\n" +
            "🚨 Police: 119\n" +
            "🚑 Ambulance: 1990\n" +
            "🔧 Roadside Assistance: +94 77 911 911\n" +
            "📞 Ride Machan Support: +94 11 234 5678"
        );
    }
</script>

<!-- ================= PAGE ANIMATIONS ================= -->
<style>
    .stat-card {
        transition: transform 0.3s ease;
    }

    .stat-card:hover {
        transform: translateY(-5px);
    }

    .main-content > * {
        opacity: 0;
        animation: fadeInUp 0.6s ease forwards;
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

</body>
</html>
