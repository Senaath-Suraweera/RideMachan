<!DOCTYPE html>
<html lang="en">
<head>
    <!-- ===================
             Meta & Stylesheets
    =================== -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings - Ride Machan</title>
    <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <link
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/settings.css" />
</head>
<body>
<div class="container">
    <!-- Include Navbar -->
    <div id="navbar-container"></div>

    <!-- Include Header -->
    <div id="header-container"></div>

    <!-- ===================
             Main Content
    =================== -->
    <div class="main-content">
        <div class="settings-container">
            <!-- ===================
                 Profile Information Section
            =================== -->
            <div class="settings-card">
                <div class="card-header">
                    <div class="card-title">
                        <i class="fas fa-user"></i>
                        <h3>Profile Information</h3>
                    </div>
                    <button class="btn btn-outline btn-sm update-profile-btn" id="toggleEditBtn">
                        <i class="fas fa-edit"></i>
                        Update Profile
                    </button>
                </div>

                <div class="card-content">
                    <div class="profile-avatar">
                        <div class="avatar-circle">
                            <i class="fas fa-user"></i>
                        </div>
                        <div class="avatar-info">
                            <h4 id="profileName">Loading...</h4>
                            <p id="profileType">Profile Name</p>
                        </div>
                    </div>

                    <!-- ===== Common Account Details ===== -->
                    <h4 class="section-subtitle">Account Details</h4>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Username <small>(cannot be changed)</small></label>
                            <input id="username" type="text" readonly disabled>
                        </div>
                        <div class="form-group">
                            <label>Customer Type <small>(cannot be changed)</small></label>
                            <input id="customerType" type="text" readonly disabled>
                        </div>
                        <div class="form-group">
                            <label>Email <small>(cannot be changed)</small></label>
                            <input id="email" type="email" readonly disabled>
                        </div>
                        <div class="form-group">
                            <label>Phone Number</label>
                            <input id="phone" type="text" readonly>
                        </div>
                        <div class="form-group">
                            <label>First Name</label>
                            <input id="firstname" type="text" readonly>
                        </div>
                        <div class="form-group">
                            <label>Last Name</label>
                            <input id="lastname" type="text" readonly>
                        </div>
                    </div>

                    <!-- ===== Address ===== -->
                    <h4 class="section-subtitle">Address</h4>
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label>Street</label>
                            <input id="street" type="text" readonly>
                        </div>
                        <div class="form-group">
                            <label>City</label>
                            <input id="city" type="text" readonly>
                        </div>
                        <div class="form-group">
                            <label>ZIP Code</label>
                            <input id="zipCode" type="text" readonly>
                        </div>
                        <div class="form-group full-width">
                            <label>Country</label>
                            <input id="country" type="text" readonly>
                        </div>
                    </div>

                    <!-- ===== LOCAL CUSTOMER ONLY ===== -->
                    <div id="localSection" style="display:none;">
                        <h4 class="section-subtitle">
                            Identification (Local) <small>read-only</small>
                        </h4>
                        <div class="form-grid">
                            <div class="form-group">
                                <label>NIC Number</label>
                                <input id="nicNumber" type="text" readonly disabled>
                            </div>
                            <div class="form-group">
                                <label>Driver's License Number</label>
                                <input id="driversLicenseNumber" type="text" readonly disabled>
                            </div>
                        </div>
                        <div class="document-images">
                            <div class="doc-image-card">
                                <p>NIC Image</p>
                                <img id="nicImage" src="" alt="NIC not uploaded" />
                            </div>
                            <div class="doc-image-card">
                                <p>Driver's License Image</p>
                                <img id="licenseImageLocal" src="" alt="License not uploaded" />
                            </div>
                        </div>
                    </div>

                    <!-- ===== FOREIGN CUSTOMER ONLY ===== -->
                    <div id="foreignSection" style="display:none;">
                        <h4 class="section-subtitle">
                            Identification (Foreign) <small>read-only</small>
                        </h4>
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Passport Number</label>
                                <input id="passportNumber" type="text" readonly disabled>
                            </div>
                            <div class="form-group">
                                <label>Int'l Driver's License Number</label>
                                <input id="intlLicenseNumber" type="text" readonly disabled>
                            </div>
                        </div>
                        <div class="document-images">
                            <div class="doc-image-card">
                                <p>Passport Image</p>
                                <img id="passportImage" src="" alt="Passport not uploaded" />
                            </div>
                            <div class="doc-image-card">
                                <p>Driver's License Image</p>
                                <img id="licenseImageForeign" src="" alt="License not uploaded" />
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Load the JS -->
            <script src="../js/settings.js"></script>

            <!-- ===================
                 Change Password Section
            =================== -->
            <div class="settings-card">
                <div class="card-header">
                    <div class="card-title">
                        <i class="fas fa-lock"></i>
                        <h3>Change Password</h3>
                    </div>
                </div>
                <div class="card-content">
                    <div class="form-grid password-grid">
                        <div class="form-group full-width">
                            <label>Current Password</label>
                            <input type="password" placeholder="Enter your current password">
                        </div>
                        <div class="form-group full-width">
                            <label>New Password</label>
                            <input type="password" placeholder="Enter your new password">
                        </div>
                        <div class="form-group full-width">
                            <label>Confirm New Password</label>
                            <input type="password" placeholder="Confirm your new password">
                        </div>
                    </div>
                    <button class="btn btn-primary update-password-btn">
                        <i class="fas fa-key"></i>
                        Update Password
                    </button>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    // Load header and navbar
    async function loadComponents() {
        try {
            // Load navbar
            const navbarResponse = await fetch('../components/navbar.html');
            const navbarHTML = await navbarResponse.text();
            document.getElementById('navbar-container').innerHTML = navbarHTML;

            // Load header and set page title
            const headerResponse = await fetch('../components/header.html');
            let headerHTML = await headerResponse.text();
            headerHTML = headerHTML.replace('{{PAGE_TITLE}}', 'Settings');
            document.getElementById('header-container').innerHTML = headerHTML;

            // Initialize components after loading
            initializeComponents();
        } catch (error) {
            console.error('Error loading components:', error);
        }
    }

    function initializeComponents() {
        // Set active nav item
        const settingsNavItem = document.querySelector('[data-page="settings"]');
        if (settingsNavItem) {
            settingsNavItem.classList.add('active');
        }

        // Toggle switch functionality
        document.querySelectorAll('.toggle-switch input').forEach(checkbox => {
            checkbox.addEventListener('change', function() {
                console.log(`${this.id} is now ${this.checked ? 'enabled' : 'disabled'}`);

                showNotification(
                    `${this.id.replace('-', ' ')} ${this.checked ? 'enabled' : 'disabled'}`,
                    'success'
                );
            });
        });

        // Update password button functionality
        const updatePasswordBtn = document.querySelector('.update-password-btn');
        if (updatePasswordBtn) {
            updatePasswordBtn.addEventListener('click', function() {
                const passwordInputs = document.querySelectorAll('.password-grid input');
                let allFilled = true;
                let currentPassword = '';
                let newPassword = '';
                let confirmPassword = '';

                passwordInputs.forEach((input, index) => {
                    if (!input.value.trim()) {
                        allFilled = false;
                    } else {
                        if (index === 0) currentPassword = input.value;
                        if (index === 1) newPassword = input.value;
                        if (index === 2) confirmPassword = input.value;
                    }
                });

                if (!allFilled) {
                    showNotification('Please fill in all password fields.', 'error');
                    return;
                }

                if (newPassword !== confirmPassword) {
                    showNotification('New passwords do not match.', 'error');
                    return;
                }

                if (newPassword.length < 8) {
                    showNotification('New password must be at least 8 characters long.', 'error');
                    return;
                }

                // Simulate password update
                showNotification('Password updated successfully!', 'success');
                passwordInputs.forEach(input => input.value = '');
            });
        }

        // Security buttons
        document.querySelectorAll('.security-item .btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const action = this.textContent.trim();
                showNotification(`${action} feature coming soon!`, 'info');
            });
        });
    }

    function showNotification(message, type = 'info') {
        const notification = document.createElement('div');
        const icons = {
            success: 'fa-check-circle',
            error: 'fa-exclamation-circle',
            info: 'fa-info-circle'
        };
        const colors = {
            success: 'var(--success)',
            error: 'var(--danger)',
            info: 'var(--info)'
        };

        notification.style.cssText = `
                    position: fixed;
                    top: 20px;
                    right: 20px;
                    background: ${colors[type]};
                    color: white;
                    padding: 15px 20px;
                    border-radius: var(--radius);
                    box-shadow: var(--shadow);
                    z-index: 9999;
                    animation: slideInRight 0.3s ease;
                    max-width: 300px;
                `;

        notification.innerHTML = `
                    <i class="fas ${icons[type]}"></i>
                    ${message}
                `;

        document.body.appendChild(notification);

        setTimeout(() => {
            notification.style.animation = 'slideOutRight 0.3s ease';
            setTimeout(() => notification.remove(), 300);
        }, 3000);
    }

    // Add CSS animations
    const style = document.createElement('style');
    style.textContent = `
                @keyframes slideInRight {
                    from {
                        transform: translateX(100%);
                        opacity: 0;
                    }
                    to {
                        transform: translateX(0);
                        opacity: 1;
                    }
                }
                @keyframes slideOutRight {
                    from {
                        transform: translateX(0);
                        opacity: 1;
                    }
                    to {
                        transform: translateX(100%);
                        opacity: 0;
                    }
                }
            `;
    document.head.appendChild(style);

    // Load components when DOM is ready
    document.addEventListener('DOMContentLoaded', loadComponents);
</script>
</body>
</html>
