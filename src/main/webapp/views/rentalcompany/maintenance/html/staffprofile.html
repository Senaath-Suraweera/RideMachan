<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ride Machan - Staff Profile</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/staffprofile.css" />
  </head>
  <body data-active-page="profile">
    <div class="container">
      <!-- Sidebar (injected by layout.js) -->
      <aside id="sidebar-mount"></aside>

      <!-- Header (injected by layout.js) -->
      <header id="header-mount"></header>

      <!-- Main Content -->
      <div class="main-content" id="staff-main">
        <!-- Profile Header -->
        <div class="profile-header">
          <div class="profile-main">
            <div class="profile-avatar">MS</div>
            <div class="profile-info">
              <h2 id="staffGreeting">Hi,</h2>
              <p class="profile-role">Maintenance Staff</p>
            </div>
          </div>
        </div>

        <!-- Profile Details -->
        <div class="profile-details">
          <!-- Personal Information -->
          <div class="profile-card">
            <div class="card-header">
              <h3 class="card-title">
                <i class="fas fa-user card-icon-small"></i>
                Personal Information
              </h3>
            </div>
            <div class="info-grid">
              <div class="info-item">
                <span class="info-label">Username</span>
                <span class="info-value" id="staffUsername"></span>
              </div>
              <div class="info-item">
                <span class="info-label">Full Name</span>
                <span class="info-value" id="staffName"></span>
              </div>
              <div class="info-item">
                <span class="info-label">Phone no</span>
                <span class="info-value" id="staffPhone"></span>
              </div>
              <div class="info-item">
                <span class="info-label">Email</span>
                <span class="info-value email" id="staffEmail"></span>
              </div>
            </div>
          </div>

          <!-- Company/Employment Information -->
          <div class="profile-card">
            <div class="card-header">
              <h3 class="card-title">
                <i class="fas fa-building card-icon-small"></i>
                Company/Employment Information
              </h3>
            </div>
            <div class="info-grid">
              <div class="info-item">
                <span class="info-label">Rental Company</span>
                <span class="info-value" id="companyName"></span>
              </div>
              <div class="info-item">
                <span class="info-label">Company Location</span>
                <span class="info-value" id="garage"></span>
              </div>
              <div class="info-item">
                <span class="info-label">Employee ID</span>
                <span class="info-value" id="employeeId"></span>
              </div>
              <div class="info-item">
                <span class="info-label">Specialization</span>
                <span class="info-value" id="staffSpecialization"></span>
              </div>
              <div class="info-item">
                <span class="info-label">Years of Experience</span>
                <span class="info-value" id="staffYearsOfExperience"></span>
              </div>
              <div class="info-item">
                <span class="info-label">Status</span>
                <span
                  class="info-value status-badge ok"
                  id="staffStatus"
                ></span>
              </div>
            </div>
          </div>
        </div>

        <!-- Quick Actions -->
        <div class="quick-actions">
          <h3>Account Actions</h3>
          <div class="quick-actions-grid">
            <button
              class="action-btn"
              id="update-Password-UI-btn"
              type="button"
            >
              <i class="fas fa-key"></i>
              <span>Change Password</span>
            </button>
            <button
              class="action-btn outline"
              id="update-Profile-UI-btn"
              type="button"
            >
              <i class="fas fa-edit"></i>
              <span>Update Profile</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Login-required modal -->
    <div
      id="loginModal"
      style="
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        justify-content: center;
        align-items: center;
        z-index: 1000;
      "
    >
      <div
        style="
          background: white;
          padding: 20px;
          border-radius: 8px;
          text-align: center;
          width: 300px;
        "
      >
        <p style="margin-bottom: 20px">Login First</p>
        <button id="loginOkBtn" style="padding: 8px 16px; cursor: pointer">
          OK
        </button>
      </div>
    </div>

    <script src="../js/layout.js" defer></script>
    <script src="../js/staffprofile.js" defer></script>
  </body>
</html>
