<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Ride Machan - Dashboard</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/dashboard.css" />
  </head>
  <body data-active-page="dashboard">
    <div class="container">
      <!-- Sidebar (injected by layout.js) -->
      <aside id="sidebar-mount"></aside>

      <!-- Header (injected by layout.js) -->
      <header id="header-mount"></header>

      <!-- ===================
            Main Content Area
        =================== -->
      <div class="main-content">
        <!-- Page Title & Actions -->
        <div class="page-title">
          <div class="title">Dashboard</div>
        </div>

        <!-- Stats Cards -->
        <div class="stats-cards">
          <!--Javascript will render stat card -->
        </div>

        <!-- Maintenance Types Distribution -->
        <div class="content-card distribution-card">
          <!--Javascript will render maintenance distribution-->
        </div>

        <!--===================
                Recent Activity Section
            =================== -->
        <div class="task-sections">
          <div class="activity">
            <div class="recent-activity">
              <!--Javascript will render recent activity-->
            </div>

            <div class="upcoming-activity">
              <!--javascript will render upcoming activity-->
            </div>

            <!-- Fleet Health Status -->
            <div class="content-card fleet-health-card">
              <!--Javascript will render Fleet health-->
            </div>
          </div>
        </div>
      </div>
    </div>

    <div
      id="loginModal"
      style="
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        justify-content: center;
        align-items: center;
        z-index: 1000;
      "
    >
      <div
        style="
          background: white;
          padding: 20px;
          border-radius: 8px;
          text-align: center;
          width: 300px;
        "
      >
        <p style="margin-bottom: 20px">Login First</p>
        <button id="loginOkBtn" style="padding: 8px 16px; cursor: pointer">
          OK
        </button>
      </div>
    </div>

    <script src="../js/layout.js" defer></script>
    <script src="../js/dashboard.js" defer></script>
  </body>
</html>
