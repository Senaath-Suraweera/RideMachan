<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notifications - Ride Machan</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/notification.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
    />
  </head>
  <body data-active-page="notification">
    <div class="dashboard-container">
      <!-- Sidebar (injected by layout.js) -->
      <aside id="sidebar-mount"></aside>

      <!-- Main Content -->
      <div class="main-content main">
        <!-- Header (injected by layout.js) -->
        <header id="header-mount"></header>

        <div class="page-content">
          <div class="page-header">
            <div class="page-title-section">
              <h1 class="page-title">Maintenance Notifications</h1>
              <p class="page-subtitle">
                Stay updated with work assignments, deadlines, and vehicle
                reports
              </p>
            </div>
            <button class="btn-secondary" id="markAllReadBtn">
              <i class="fas fa-check-double"></i>
              Mark All as Read
            </button>
          </div>

          <!-- Notifications List (dynamically populated) -->
          <div class="notifications-container">
            <div class="notifications-list" id="notificationList">
              <div class="notification-card team-communication">
                <div class="notification-content" style="padding: 1rem">
                  <p>Loading notifications...</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Load shared layout first so #notificationCount exists -->
    <script src="../js/layout.js" defer></script>

    <!-- ===================
         Notification list rendering & actions.
         NOTE: badge count is handled by layout.js; after mutating state
         we call window.refreshNotificationBadge() to re-sync the header.
    =================== -->
    <script defer>
      const API_BASE = "/api/notifications";

      // ── Load notifications list ──
      async function loadNotifications() {
        const list = document.getElementById("notificationList");

        try {
          const response = await fetch(`${API_BASE}?limit=50&offset=0`, {
            method: "GET",
            credentials: "include",
            headers: { Accept: "application/json" },
          });

          if (response.status === 401) {
            list.innerHTML = emptyState(
              "Not logged in",
              "Please sign in to view notifications.",
            );
            return;
          }
          if (!response.ok) throw new Error(`HTTP ${response.status}`);

          const data = await response.json();

          if (
            !data.ok ||
            !Array.isArray(data.notifications) ||
            data.notifications.length === 0
          ) {
            list.innerHTML = emptyState(
              "No notifications yet",
              "You do not have any notifications right now.",
            );
            return;
          }

          list.innerHTML = data.notifications.map(renderNotification).join("");
          bindNotificationActions();
        } catch (error) {
          console.error("Failed to load notifications:", error);
          list.innerHTML = emptyState(
            "Failed to load notifications",
            "Please try again later.",
          );
        }
      }

      function emptyState(title, msg) {
        return `
                <div class="notification-card team-communication">
                    <div class="notification-avatar">
                        <i class="fas fa-info-circle"></i>
                    </div>
                    <div class="notification-content">
                        <div class="notification-header">
                            <div class="sender-info">
                                <span class="sender-name">${escapeHtml(title)}</span>
                            </div>
                        </div>
                        <div class="notification-message">${escapeHtml(msg)}</div>
                    </div>
                </div>
            `;
      }

      function renderNotification(n) {
        const categoryClass = mapCategoryClass(n.type);
        const iconClass = mapIcon(n.type);
        const priority = mapPriority(n.type);
        const senderType = mapSenderType(n.type);
        const refLabel =
          n.referenceType && n.referenceId
            ? `#${escapeHtml(n.referenceType)}-${n.referenceId}`
            : "";
        const timeText = formatTimeAgo(n.createdAt);
        const unreadClass = n.isRead ? "" : "unread";

        let actionsHtml = "";
        if (!n.isRead) {
          actionsHtml = `
                    <div class="notification-actions">
                        <button class="btn-outline mark-read-btn" data-id="${n.notificationId}">
                            Mark as Read
                        </button>
                    </div>
                `;
        }

        return `
                <div class="notification-card ${categoryClass} ${unreadClass}"
                     data-id="${n.notificationId}"
                     data-type="${escapeHtml(n.type)}"
                     data-ref-type="${escapeHtml(n.referenceType)}"
                     data-ref-id="${n.referenceId}">
                    <div class="notification-avatar">
                        <i class="fas ${iconClass}"></i>
                    </div>
                    <div class="notification-content">
                        <div class="notification-header">
                            <div class="sender-info">
                                <span class="sender-name">${escapeHtml(n.title)}</span>
                                <span class="sender-type">${escapeHtml(senderType)}</span>
                                ${refLabel ? `<span class="sender-id">${refLabel}</span>` : ""}
                            </div>
                            <div class="notification-time">${timeText}</div>
                        </div>
                        <div class="notification-message">${escapeHtml(n.body)}</div>
                        <div class="notification-priority ${priority.cls}">
                            <i class="fas ${priority.icon}"></i>
                            ${priority.label}
                        </div>
                    </div>
                    ${actionsHtml}
                </div>
            `;
      }

      function bindNotificationActions() {
        document.querySelectorAll(".mark-read-btn").forEach((btn) => {
          btn.addEventListener("click", async (e) => {
            e.preventDefault();
            e.stopPropagation();
            await markNotificationAsRead(btn.dataset.id);
          });
        });
      }

      async function markNotificationAsRead(id) {
        try {
          const response = await fetch(
            `${API_BASE}/read?id=${encodeURIComponent(id)}`,
            { method: "POST", credentials: "include" },
          );
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const data = await response.json();
          if (data.ok) {
            if (typeof window.refreshNotificationBadge === "function") {
              await window.refreshNotificationBadge();
            }
            await loadNotifications();
          }
        } catch (error) {
          console.error("Failed to mark notification as read:", error);
        }
      }

      async function markAllNotificationsAsRead() {
        try {
          const response = await fetch(`${API_BASE}/readAll`, {
            method: "POST",
            credentials: "include",
          });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const data = await response.json();
          if (data.ok) {
            if (typeof window.refreshNotificationBadge === "function") {
              await window.refreshNotificationBadge();
            }
            await loadNotifications();
          }
        } catch (error) {
          console.error("Failed to mark all as read:", error);
        }
      }

      // ─── Mapping helpers ───
      function mapCategoryClass(type) {
        switch ((type || "").toUpperCase()) {
          case "MAINTENANCE":
            return "work-assignment";
          case "BOOKING":
            return "work-assignment";
          case "REPORT":
            return "vehicle-report";
          case "TICKET":
            return "job-deadline";
          case "SYSTEM":
            return "team-communication";
          case "GENERAL":
            return "team-communication";
          case "NEW_MESSAGE":
            return "team-communication";
          default:
            return "team-communication";
        }
      }

      function mapIcon(type) {
        switch ((type || "").toUpperCase()) {
          case "MAINTENANCE":
            return "fa-clipboard-list";
          case "BOOKING":
            return "fa-car";
          case "REPORT":
            return "fa-exclamation-triangle";
          case "TICKET":
            return "fa-clock";
          case "SYSTEM":
            return "fa-user-tie";
          case "GENERAL":
            return "fa-comments";
          case "NEW_MESSAGE":
            return "fa-comments";
          default:
            return "fa-bell";
        }
      }

      function mapSenderType(type) {
        switch ((type || "").toUpperCase()) {
          case "MAINTENANCE":
            return "Work Assignment";
          case "BOOKING":
            return "Booking Update";
          case "REPORT":
            return "Vehicle Report";
          case "TICKET":
            return "Support Ticket";
          case "SYSTEM":
            return "System Alert";
          case "GENERAL":
            return "Team Message";
          case "NEW_MESSAGE":
            return "Message";
          default:
            return "Notification";
        }
      }

      function mapPriority(type) {
        switch ((type || "").toUpperCase()) {
          case "REPORT":
            return {
              cls: "high-priority",
              icon: "fa-exclamation-triangle",
              label: "Critical Alert",
            };
          case "MAINTENANCE":
            return {
              cls: "medium-priority",
              icon: "fa-clock",
              label: "Scheduled",
            };
          case "BOOKING":
            return {
              cls: "medium-priority",
              icon: "fa-calendar-alt",
              label: "Booking",
            };
          case "TICKET":
            return {
              cls: "medium-priority",
              icon: "fa-clock",
              label: "Due Soon",
            };
          case "SYSTEM":
            return {
              cls: "low-priority",
              icon: "fa-info-circle",
              label: "System",
            };
          default:
            return {
              cls: "low-priority",
              icon: "fa-info-circle",
              label: "Information",
            };
        }
      }

      function formatTimeAgo(dateString) {
        if (!dateString || dateString === "null") return "Just now";
        const date = new Date(dateString.replace(" ", "T"));
        if (isNaN(date.getTime())) return "Just now";

        const now = new Date();
        const diffMs = now - date;
        const diffMins = Math.floor(diffMs / 60000);
        const diffHours = Math.floor(diffMs / 3600000);
        const diffDays = Math.floor(diffMs / 86400000);

        if (diffMins < 1) return "Just now";
        if (diffMins < 60)
          return `${diffMins} minute${diffMins !== 1 ? "s" : ""} ago`;
        if (diffHours < 24)
          return `${diffHours} hour${diffHours !== 1 ? "s" : ""} ago`;
        return `${diffDays} day${diffDays !== 1 ? "s" : ""} ago`;
      }

      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text == null ? "" : String(text);
        return div.innerHTML;
      }

      // ── Wire up "Mark All as Read" ──
      document.addEventListener("DOMContentLoaded", () => {
        const markAllBtn = document.getElementById("markAllReadBtn");
        if (markAllBtn) {
          markAllBtn.addEventListener("click", markAllNotificationsAsRead);
        }

        loadNotifications();
        // Badge count is loaded by layout.js automatically
      });
    </script>

    <script src="../js/notifications.js" defer></script>
  </body>
</html>
