<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ride Machan - Maintenance Logs</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/maintenancelog.css" />
  </head>
  <body data-active-page="inspection">
    <div class="container">
      <!-- Sidebar (injected by layout.js) -->
      <aside id="sidebar-mount"></aside>

      <!-- Header (injected by layout.js) -->
      <header id="header-mount"></header>

      <!-- Main Content -->
      <div class="main-content">
        <!-- Page Header with Tabs -->
        <div class="page-title">
          <div class="title">Maintenance Logs</div>
        </div>

        <!-- Filters Section -->
        <div class="search-filters">
          <div class="filter-controls">
            <h4>Choose Vehicle</h4>
            <select class="filter-select" id="vehicleFilter">
              <!--Javascript will render assigned vehicles dropdown-->
            </select>
          </div>
        </div>

        <!-- Tabs Navigation -->
        <div class="tabs-container">
          <div class="tabs">
            <div class="tab">
              <a href="inspection.html">Detailed Inspection</a>
            </div>
            <div class="tab active">
              <a href="maintenancelog.html">Maintenance Log</a>
            </div>
          </div>
        </div>

        <div id="vehicle">
          <!-- Content Section -->
          <div class="content-section">
            <div class="section-header">
              <h2>Maintenance Work Orders</h2>
              <p class="section-subtitle">Track and manage maintenance tasks</p>
            </div>

            <!--Javascript will render maintenance logs or say no maintenance logs in ui-->
            <div id="maintenanceContainer"></div>
          </div>

          <!-- Vehicle Info -->
          <div class="vehicle-info">
            <!--Javascript will render vehicle card-->
          </div>
        </div>

        <div class="compliance-grid">
          <!-- Sidebar Cards -->
          <div class="sidebar-card"></div>
        </div>
      </div>
    </div>

    <div
      id="loginModal"
      style="
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        justify-content: center;
        align-items: center;
        z-index: 1000;
      "
    >
      <div
        style="
          background: white;
          padding: 20px;
          border-radius: 8px;
          text-align: center;
          width: 300px;
        "
      >
        <p style="margin-bottom: 20px">Login First</p>
        <button id="loginOkBtn" style="padding: 8px 16px; cursor: pointer">
          OK
        </button>
      </div>
    </div>

    <script src="../js/layout.js" defer></script>
    <script src="../js/maintenancelog.js" defer></script>
  </body>
</html>
