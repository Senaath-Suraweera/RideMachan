<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ride Machan - Maintenance Logs</title>

    <aside class="sidebar">

            <img src="../assets/ridemachan-logo.png" alt="RideMachan Logo" class="logo">
        </div>

        <nav class="nav-menu">
            <ul>
                <h3>Main Navigation</h3>
                <li class="nav-item">
                    <a href="dashboard.html" class="nav-link">

                </li>
                <li class="nav-item active">
                    <a href="inspection.html" class="nav-link">
                        <i class="fas fa-tools"></i>
                        <span>Maintenance Logs</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="vehiclerecords.html" class="nav-link">
                        <i class="fas fa-file"></i>
                        <span>Vehicle Records</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="maintenance-calender.html" class="nav-link">
                        <i class="fas fa-calendar"></i>
                        <span>Calendar</span>
                    </a>
                </li>
            </ul>
        </nav>

        <div class="logout-section">
            <a href="#" class="nav-link">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </a>
        </div>
    </aside>

    <!-- Header -->
    <div class="header">
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Search vehicles, maintenance records..." id="searchInput">
        </div>

        <div class="header-actions">
            <div class="notification">
                <a href="notification.html" class="notification">
                    <i class="fas fa-bell"></i>
                    <div class="badge">3</div>
                </a>
            </div>
            <div class="user-profile">
                <div class="profile-img">MS</div>
                <div class="user-info">
                    <div class="user-name">Mr. Sivajan</div>
                    <div class="user-role">Maintenance Staff</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Page Header with Tabs -->
        <div class="page-title">
            <div class="title">Maintenance Logs</div>
        </div>

        <!-- Filters Section -->
        <div class="search-filters">
            <div class="filter-controls">
                <h4>Choose Vehicle</h4>
                <select class="filter-select" id="vehicleFilter">
                    <!--Javascript will render assigned vehicles dropdown-->
                </select>
            </div>
        </div>

        <!-- Tabs Navigation -->
        <div class="tabs-container">
            <div class="tabs">
                <div class="tab">
                    <a href="inspection.html">Detailed Inspection</a>
                </div>
                <div class="tab active">
                    <a href="maintenancelog.html">Maintenance Log</a>
                </div>
            </div>
        </div>

        <div id="vehicle">
            <!-- Content Section -->
            <div class="content-section">
                <div class="section-header">
                    <h2>Maintenance Work Orders</h2>
                    <p class="section-subtitle">Track and manage maintenance tasks</p>
                </div>

                <!--Javascript will render maintenance logs or say no maintenance logs in ui-->
                <div id="maintenanceContainer"></div>
            </div>

            <!-- Vehicle Info -->
            <div class="vehicle-info">
                <!--Javascript will render vehicle card-->
            </div>
        </div>

        <div class="compliance-grid">

            <!-- Sidebar Cards -->
            <div class="sidebar-card">
                <!--<div class="compliance-item valid">
                    <div class="compliance-info">
                        <h4>Emission Test</h4>
                        <p>Valid until May 2024</p>
                    </div>
                    <i class="fas fa-check-circle compliance-status valid"></i>
                </div>

                <div class="compliance-item warning">
                    <div class="compliance-info">
                        <h4>Insurance</h4>
                        <p>Expires in 30 days</p>
                    </div>
                    <i class="fas fa-exclamation-triangle compliance-status warning"></i>
                </div>

                <div class="compliance-item valid">
                    <div class="compliance-info">
                        <h4>Safety Permit</h4>
                        <p>Up to date</p>
                    </div>
                    <i class="fas fa-check-circle compliance-status valid"></i>
                </div>

                <button class="view-all-btn" onclick="viewAllDocuments()">
                    <i class="fas fa-external-link-alt"></i>
                    View All Documents
                </button>-->
            </div>
        </div>
    </div>
</div>











<div id="loginModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:1000;">
    <div style="background:white; padding:20px; border-radius:8px; text-align:center; width:300px;">
        <p style="margin-bottom:20px;">Login First</p>
        <button id="loginOkBtn" style="padding:8px 16px; cursor:pointer;">OK</button>
    </div>
</div>

<script src="../js/maintenancelog.js"></script>

</html>
