<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maintenance Staff - Car Rental System</title>

    <link rel="stylesheet" href="../css/maintenance-staff.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>

    <script src="../js/maintenance-staff.js" defer></script>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-section">
                <img
                    src="../assets/ridemachan-logo.png"
                    alt="RideMachan Logo"
                    class="logo"
                />
            </div>

            <nav class="nav-menu">
                <ul>
                    <li class="nav-item">
                        <a href="homepage.html" class="nav-link">
                            <i class="fas fa-home"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="booking-management.html" class="nav-link">
                            <i class="fas fa-box"></i>
                            <span>Bookings</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="vehicle-fleet.html" class="nav-link">
                            <i class="fas fa-car"></i>
                            <span>Vehicle Fleet</span>
                        </a>
                    </li>
                    <li class="nav-item active">
                        <a href="maintenance-staff.html" class="nav-link">
                            <i class="fas fa-tools"></i>
                            <span>Maintenance Staff</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="driver-management.html" class="nav-link">
                            <i class="fas fa-users"></i>
                            <span>Drivers</span>
                        </a>
                    </li>
                </ul>
            </nav>

            <div class="logout-section">
                <a href="#" class="nav-link">
                    <i class="fas fa-sign-out"></i>
                    <span>Logout</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <header class="header">
                <div class="header-left">
                    <div class="breadcrumb">
                        <i class="fas fa-th-large"></i>
                        <span>Company Dashboard</span>
                    </div>
                </div>

                <div class="header-right">
                    <div class="notification-icon">
                        <a href="notification.html">
                            <i class="fas fa-bell"></i>
                            <span class="notification-badge">1</span>
                        </a>
                    </div>

                    <div class="user-profile">
                        <div class="user-avatar">A</div>
                        <span class="user-name">ABC Rentals</span>
                    </div>
                </div>
            </header>

            <!-- Page Content -->
            <div class="page-content">
                <div class="page-header">
                    <div class="page-title-section">
                        <h1 class="page-title">Maintenance Staff</h1>
                        <p class="page-subtitle">
                            Manage your maintenance team and vehicle assignments
                        </p>
                    </div>

                    <button class="btn-primary main-add-btn" onclick="openAddStaffModal()">
                        <i class="fas fa-plus"></i>
                        Add Staff Member
                    </button>
                </div>

                <!-- Stats Cards -->
                <div class="stats-grid">
                    <!--Javascript will render staff stat cards-->
                </div>

                <!-- Search and Filter -->
                <div class="search-filter-section">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input
                            type="text"
                            placeholder="Search staff by name, ID, or specialization..."
                           id="staffSearch"
                        />
                    </div>

                    <div class="filter-dropdown">
                        <select id="staffFilter">
                            <option value="all">All Staff</option>
                            <option value="available">Available</option>
                            <option value="on Job">On Job</option>
                            <option value="offline">Offline</option>
                        </select>
                        <i class="fas fa-filter"></i>
                    </div>
                </div>

                <!-- Staff Cards -->
                <div class="staff-grid">
                    <!--Javascript will render Staff cards will be injected here  -->
                </div>
            </div>
        </div>
    </div>

    <!-- Add Staff Modal -->
    <div id="addStaffModal" class="modal" style="display: none">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add Maintenance Staff Member</h2>
                <span class="close" onclick="closeAddStaffModal()">&times;</span>
            </div>

            <form id="addStaffForm" class="modal-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" required />
                    </div>

                    <div class="form-group">
                        <label for="firstname">First Name</label>
                        <input type="text" id="firstname" name="firstname" required />
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="lastname">Last Name</label>
                        <input type="text" id="lastname" name="lastname" required />
                    </div>

                    <div class="form-group">
                        <label for="contactNumber">Mobile Number</label>
                        <input type="text" id="contactNumber" name="contactNumber" required />
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required />
                    </div>

                    <div class="form-group">
                        <label for="specialization">Specialization</label>
                        <input type="text" id="specialization" name="specialization" required />
                    </div>

                    <div class="form-group">
                        <label for="yearsofexperience">Years Of Experience</label>
                        <input type="number" id="yearsOfExperience" name="yearsOfExperience" required />
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required />
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group" style="width: 100%">
                        <label for="confirmPassword">Confirm Password</label>
                        <input
                            type="password"
                            id="confirmPassword"
                            name="confirmPassword"
                            required
                        />
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeAddStaffModal()">
                        Cancel
                    </button>
                    <button type="submit" class="btn-primary">Add Staff</button>
                </div>
            </form>
        </div>
    </div>






    <div id="loginModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:1000;">
        <div style="background:white; padding:20px; border-radius:8px; text-align:center; width:300px;">
            <p style="margin-bottom:20px;">Login First</p>
            <button id="loginOkBtn" style="padding:8px 16px; cursor:pointer;">OK</button>
        </div>
    </div>
</body>
</html>
