<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vehicle Fleet - RideMachan</title>

    <link rel="stylesheet" href="../css/vehicle-fleet.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />

    <script src="../js/vehicle-fleet.js" defer></script>
    <script src="../js/notification.js" defer></script>
  </head>
  <body>
    <div class="dashboard-container">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="logo-section">
          <img
            src="../assets/ridemachan-logo.png"
            alt="RideMachan Logo"
            class="logo"
          />
        </div>

        <nav class="nav-menu">
          <ul>
            <li class="nav-item">
              <a href="homepage.html" class="nav-link">
                <i class="fas fa-home"></i>
                <span>Dashboard</span>
              </a>
            </li>
            <li class="nav-item">
              <a href="booking-management.html" class="nav-link">
                <i class="fas fa-box"></i>
                <span>Bookings</span>
              </a>
            </li>
            <li class="nav-item active">
              <a href="vehicle-fleet.html" class="nav-link">
                <i class="fas fa-car"></i>
                <span>Vehicle Fleet</span>
              </a>
            </li>
            <li class="nav-item">
              <a href="maintenance-staff.html" class="nav-link">
                <i class="fas fa-tools"></i>
                <span>Maintenance Staff</span>
              </a>
            </li>
            <li class="nav-item">
              <a href="driver-management.html" class="nav-link">
                <i class="fas fa-users"></i>
                <span>Drivers</span>
              </a>
            </li>
            <li class="nav-item">
              <a href="messages.html" class="nav-link">
                <i class="fas fa-comments"></i>
                <span>Messages</span>
              </a>
            </li>
          </ul>
        </nav>
        <div class="logout-section">
          <a href="/rentalcompanies/logout" class="nav-link">
            <i class="fas fa-sign-out"></i>
            <span>Logout</span>
          </a>
        </div>
      </aside>

      <!-- Main Content -->
      <div class="main-content">
        <!-- Header -->
        <header class="header">
          <div class="header-left">
            <div class="breadcrumb">
              <i class="fas fa-th-large"></i>
              <span>Company Dashboard</span>
            </div>
          </div>
          <div class="header-right">
            <div class="notification-icon notification-bell">
              <a href="#" id="notifToggleBtn" style="color: #1f2937">
                <i class="fas fa-bell"></i>
                <span
                  class="notification-badge"
                  id="notifBadge"
                  style="display: none"
                  >0</span
                >
              </a>
              <div class="notification-dropdown" id="notifDropdown">
                <div class="notif-dropdown-header">
                  <h3>Notifications</h3>
                  <button class="btn-link" id="markAllReadBtn">
                    Mark all read
                  </button>
                </div>
                <div class="notif-dropdown-list" id="notifList">
                  <div class="notif-empty">Loading...</div>
                </div>
              </div>
            </div>
            <a href="profile.html" style="text-decoration: none">
              <div class="user-profile">
                <div class="user-avatar">A</div>
                <span>ABC Rentals</span>
              </div>
            </a>
          </div>
        </header>

        <!-- Page Content -->
        <div class="page-content">
          <div class="page-header">
            <div class="page-title-section">
              <h1 class="page-title">Vehicle Fleet</h1>
              <p class="page-subtitle">
                Manage your vehicle fleet and maintenance
              </p>
            </div>
            <div class="header-actions">
              <a href="Provider-Request.html" class="btn-primary btn-provider">
                <i class="fas fa-handshake"></i>
                Provider Requests
              </a>
              <button class="btn-primary" id="addVehicleBtn">
                <i class="fas fa-plus"></i>
                Add Vehicle
              </button>
            </div>
          </div>

          <!-- Stats Cards -->
          <div class="stats-grid">
            <!--Javascript will render vehicle statistics-->
          </div>

          <!-- Search and Filter -->
          <div class="search-filter-section">
            <div class="search-box">
              <i class="fas fa-search"></i>
              <input
                type="text"
                placeholder="Search vehicles by model or plate number..."
                id="vehicleSearch"
              />
            </div>
            <div class="filter-dropdown">
              <select id="vehicleFilter">
                <option value="all">All Vehicles</option>
                <option value="available">Available</option>
                <option value="on-trip">On Trip</option>
                <option value="maintenance">Maintenance</option>
              </select>
              <i class="fas fa-filter"></i>
            </div>
          </div>

          <!-- Vehicle Grid -->
          <div class="vehicle-grid" id="vehicleGrid">
            <!-- Vehicle cards will be populated by JavaScript -->
          </div>
        </div>
      </div>
    </div>

    <!-- Add Vehicle Modal -->
    <div class="modal-overlay" id="addVehicleModal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Add New Vehicle</h3>
          <button class="modal-close" id="closeAddVehicleModal">
            <i class="fas fa-times"></i>
          </button>
        </div>

        <div class="modal-body">
          <form id="addVehicleForm" enctype="multipart/form-data">
            <div class="form-row">
              <div class="form-group">
                <label for="vehiclebrand">Brand</label>
                <input
                  type="text"
                  id="vehiclebrand"
                  name="vehiclebrand"
                  required
                />
              </div>

              <div class="form-group">
                <label for="vehiclemodel">Model</label>
                <input
                  type="text"
                  id="vehiclemodel"
                  name="vehiclemodel"
                  required
                />
              </div>

              <div class="form-group">
                <label for="numberplatenumber">Plate Number</label>
                <input
                  type="text"
                  id="numberplatenumber"
                  name="numberplatenumber"
                  required
                />
              </div>

              <div class="form-group">
                <label for="tareweight">Tare Weight (kg)</label>
                <input
                  type="number"
                  id="tareweight"
                  name="tareweight"
                  required
                />
              </div>

              <div class="form-group">
                <label for="priceperday">Price Per Day</label>
                <input
                  type="text"
                  id="priceperday"
                  name="price_per_day"
                  required
                />
              </div>

              <div class="form-group">
                <label for="location">Location</label>
                <input type="text" id="location" name="location" required />
              </div>

              <div class="form-group">
                <label for="color">Color</label>
                <input type="text" id="color" name="color" required />
              </div>

              <div class="form-group">
                <label for="numberofpassengers">No. of Passengers</label>
                <input
                  type="number"
                  id="numberofpassengers"
                  name="numberofpassengers"
                  min="1"
                  required
                />
              </div>

              <!-- NEW: manufacture year -->
              <div class="form-group">
                <label for="manufactureyear">Manufacture Year</label>
                <input
                  type="number"
                  id="manufactureyear"
                  name="manufacture_year"
                  min="1950"
                  max="2026"
                  required
                />
              </div>

              <!-- NEW: vehicle type -->
              <div class="form-group">
                <label for="vehicletype">Vehicle Type</label>
                <select id="vehicletype" name="vehicle_type" required>
                  <option value="">-- Select --</option>
                  <option value="Car">Car</option>
                  <option value="SUV">SUV</option>
                  <option value="Van">Van</option>
                  <option value="Truck">Truck</option>
                  <option value="Bus">Bus</option>
                  <option value="Motorcycle">Motorcycle</option>
                  <option value="Three Wheeler">Three Wheeler</option>
                </select>
              </div>

              <!-- NEW: fuel type -->
              <div class="form-group">
                <label for="fueltype">Fuel Type</label>
                <select id="fueltype" name="fuel_type" required>
                  <option value="">-- Select --</option>
                  <option value="Petrol">Petrol</option>
                  <option value="Diesel">Diesel</option>
                  <option value="Hybrid">Hybrid</option>
                  <option value="Electric">Electric</option>
                  <option value="CNG">CNG</option>
                </select>
              </div>

              <!-- NEW: transmission -->
              <div class="form-group">
                <label for="transmission">Transmission</label>
                <select id="transmission" name="transmission" required>
                  <option value="">-- Select --</option>
                  <option value="Manual">Manual</option>
                  <option value="Automatic">Automatic</option>
                  <option value="CVT">CVT</option>
                  <option value="Semi-Automatic">Semi-Automatic</option>
                </select>
              </div>

              <div class="form-group">
                <label for="features">Features</label>
                <input
                  type="text"
                  id="features"
                  name="features"
                  minlength="3"
                  required
                />
              </div>

              <div class="form-group">
                <label for="enginecapacity">Engine Capacity (cc)</label>
                <input
                  type="number"
                  id="enginecapacity"
                  name="enginecapacity"
                  required
                />
              </div>

              <div class="form-group">
                <label for="enginenumber">Engine Number</label>
                <input
                  type="text"
                  id="enginenumber"
                  name="enginenumber"
                  required
                />
              </div>

              <div class="form-group">
                <label for="chasisnumber">Chassis Number</label>
                <input
                  type="text"
                  id="chasisnumber"
                  name="chasisnumber"
                  required
                />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="description">Description</label>
                <textarea
                  id="description"
                  name="description"
                  rows="3"
                  required
                ></textarea>
              </div>
            </div>

            <!-- Registration Document -->
            <div class="form-row">
              <div class="form-group">
                <label for="registrationdocumentation"
                  >Registration Document (PDF)</label
                >
                <input
                  type="file"
                  id="registrationdocumentation"
                  name="registrationdocumentation"
                  accept=".pdf"
                  required
                />
              </div>
            </div>

            <!-- Vehicle Image -->
            <div class="form-row">
              <div class="form-group">
                <label for="vehicleimages">Vehicle Image</label>
                <input
                  type="file"
                  id="vehicleimages"
                  name="vehicleimages"
                  accept=".jpg,.jpeg,.png"
                  required
                />
              </div>
            </div>

            <div class="form-actions">
              <button type="submit" class="btn-add-vehicle" id="addAddVehicle">
                Add Vehicle
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Edit Vehicle Modal -->
    <div class="modal-overlay" id="editVehicleModal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Edit Vehicle</h3>
          <button class="modal-close" id="closeEditVehicleModal">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="modal-body">
          <form id="editVehicleForm" enctype="multipart/form-data">
            <input type="hidden" id="editVehicleId" name="vehicleid" />

            <div class="form-row">
              <div class="form-group">
                <label>Vehicle Brand</label>
                <input
                  type="text"
                  id="editBrand"
                  name="vehiclebrand"
                  required
                />
              </div>
              <div class="form-group">
                <label>Vehicle Model</label>
                <input
                  type="text"
                  id="editModel"
                  name="vehiclemodel"
                  required
                />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Number Plate</label>
                <input
                  type="text"
                  id="editPlate"
                  name="numberplatenumber"
                  required
                />
              </div>
              <div class="form-group">
                <label>Color</label>
                <input type="text" id="editColor" name="color" required />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Tare Weight (kg)</label>
                <input
                  type="number"
                  id="editTareWeight"
                  name="tareweight"
                  required
                />
              </div>
              <div class="form-group">
                <label>Engine Capacity (cc)</label>
                <input
                  type="number"
                  id="editEngineCapacity"
                  name="enginecapacity"
                  required
                />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Passengers</label>
                <input
                  type="number"
                  id="editPassengers"
                  name="numberofpassengers"
                  required
                />
              </div>
              <div class="form-group">
                <label>Milage</label>
                <input type="text" id="editMilage" name="milage" />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Engine Number</label>
                <input
                  type="text"
                  id="editEngineNumber"
                  name="enginenumber"
                  required
                />
              </div>

              <div class="form-group">
                <label>Chasis Number</label>
                <input
                  type="text"
                  id="editChasisNumber"
                  name="chasisnumber"
                  required
                />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Price Per Day</label>
                <input
                  type="text"
                  id="editPricePerDay"
                  name="price_per_day"
                  required
                />
              </div>
              <div class="form-group">
                <label>Location</label>
                <input type="text" id="editLocation" name="location" required />
              </div>
            </div>

            <!-- NEW: manufacture year + vehicle type -->
            <div class="form-row">
              <div class="form-group">
                <label>Manufacture Year</label>
                <input
                  type="number"
                  id="editManufactureYear"
                  name="manufacture_year"
                  min="1950"
                  max="2026"
                />
              </div>
              <div class="form-group">
                <label>Vehicle Type</label>
                <select id="editVehicleType" name="vehicle_type">
                  <option value="">-- Select --</option>
                  <option value="Car">Car</option>
                  <option value="SUV">SUV</option>
                  <option value="Van">Van</option>
                  <option value="Truck">Truck</option>
                  <option value="Bus">Bus</option>
                  <option value="Motorcycle">Motorcycle</option>
                  <option value="Three Wheeler">Three Wheeler</option>
                </select>
              </div>
            </div>

            <!-- NEW: fuel type + transmission -->
            <div class="form-row">
              <div class="form-group">
                <label>Fuel Type</label>
                <select id="editFuelType" name="fuel_type">
                  <option value="">-- Select --</option>
                  <option value="Petrol">Petrol</option>
                  <option value="Diesel">Diesel</option>
                  <option value="Hybrid">Hybrid</option>
                  <option value="Electric">Electric</option>
                  <option value="CNG">CNG</option>
                </select>
              </div>
              <div class="form-group">
                <label>Transmission</label>
                <select id="editTransmission" name="transmission">
                  <option value="">-- Select --</option>
                  <option value="Manual">Manual</option>
                  <option value="Automatic">Automatic</option>
                  <option value="CVT">CVT</option>
                  <option value="Semi-Automatic">Semi-Automatic</option>
                </select>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Features</label>
                <input type="text" id="editFeatures" name="features" />
              </div>
            </div>

            <div class="form-group">
              <label>Description</label>
              <textarea
                id="editDescription"
                name="description"
                rows="3"
              ></textarea>
            </div>

            <!-- Registration Document (optional on update) -->
            <div class="form-row">
              <div class="form-group">
                <label
                  >Registration Document (PDF)
                  <small>— leave empty to keep existing</small></label
                >
                <input
                  type="file"
                  id="editRegDoc"
                  name="registrationdocumentation"
                  accept=".pdf"
                />
              </div>
            </div>

            <!-- Vehicle Image (optional on update) -->
            <div class="form-row">
              <div class="form-group">
                <label
                  >Vehicle Image
                  <small>— leave empty to keep existing</small></label
                >
                <input
                  type="file"
                  id="editImage"
                  name="vehicleimages"
                  accept="image/*"
                />
              </div>
            </div>

            <div class="form-actions">
              <button type="submit" class="btn-primary">Save Changes</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div id="loginModal" style="display: none">
      <div
        style="
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: rgba(0, 0, 0, 0.5);
          display: flex;
          justify-content: center;
          align-items: center;
          z-index: 1000;
        "
      >
        <div
          style="
            background: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            width: 300px;
          "
        >
          <p style="margin-bottom: 20px">Login First</p>
          <button id="loginOkBtn" style="padding: 8px 16px; cursor: pointer">
            OK
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
