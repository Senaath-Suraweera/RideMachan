<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookings Management - ABC Rentals</title>

    <link rel="stylesheet" href="../css/booking-management.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />

    <script src="../js/booking-management.js" defer></script>
    <script src="../js/notification.js" defer></script>
  </head>
  <body>
    <div class="dashboard-container">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="logo-section">
          <img
            src="../assets/ridemachan-logo.png"
            alt="RideMachan Logo"
            class="logo"
          />
        </div>

        <nav class="nav-menu">
          <ul>
            <li class="nav-item">
              <a href="homepage.html" class="nav-link">
                <i class="fas fa-home"></i>
                <span>Dashboard</span>
              </a>
            </li>
            <li class="nav-item active">
              <a href="booking-management.html" class="nav-link">
                <i class="fas fa-box"></i>
                <span>Bookings</span>
              </a>
            </li>
            <li class="nav-item">
              <a href="vehicle-fleet.html" class="nav-link">
                <i class="fas fa-car"></i>
                <span>Vehicle Fleet</span>
              </a>
            </li>
            <li class="nav-item">
              <a href="maintenance-staff.html" class="nav-link">
                <i class="fas fa-tools"></i>
                <span>Maintenance Staff</span>
              </a>
            </li>
            <li class="nav-item">
              <a href="driver-management.html" class="nav-link">
                <i class="fas fa-users"></i>
                <span>Drivers</span>
              </a>
            </li>
            <li class="nav-item">
              <a href="messages.html" class="nav-link">
                <i class="fas fa-comments"></i>
                <span>Messages</span>
              </a>
            </li>
          </ul>
        </nav>

        <div class="logout-section">
          <a href="/rentalcompanies/logout" class="nav-link">
            <i class="fas fa-sign-out"></i>
            <span>Logout</span>
          </a>
        </div>
      </aside>

      <!-- Main Content -->
      <div class="main-content">
        <!-- Header -->
        <header class="header">
          <div class="header-left">
            <div class="breadcrumb">
              <i class="fas fa-th-large"></i>
              <span>Company Dashboard</span>
            </div>
          </div>
          <div class="header-right">
            <div class="notification-icon notification-bell">
              <a href="#" id="notifToggleBtn" style="color: #1f2937">
                <i class="fas fa-bell"></i>
                <span
                  class="notification-badge"
                  id="notifBadge"
                  style="display: none"
                  >0</span
                >
              </a>
              <div class="notification-dropdown" id="notifDropdown">
                <div class="notif-dropdown-header">
                  <h3>Notifications</h3>
                  <button class="btn-link" id="markAllReadBtn">
                    Mark all read
                  </button>
                </div>
                <div class="notif-dropdown-list" id="notifList">
                  <div class="notif-empty">Loading...</div>
                </div>
              </div>
            </div>
            <a href="profile.html" style="text-decoration: none">
              <div class="user-profile">
                <div class="user-avatar">A</div>
                <span>ABC Rentals</span>
              </div>
            </a>
          </div>
        </header>

        <!-- Page Content -->
        <div class="page-content">
          <div class="page-header">
            <div class="page-title-section">
              <h1 class="page-title">Bookings Management</h1>
              <p class="page-subtitle">View and manage all vehicle bookings</p>
            </div>
          </div>

          <div class="filters-section">
            <div class="search-bar">
              <i class="fas fa-search"></i>
              <input
                type="text"
                placeholder="Search by booking ID, customer name, or vehicle..."
                id="searchInput"
              />
            </div>
            <div class="filter-dropdown">
              <select id="statusFilter">
                <option value="all">All Bookings</option>
                <option value="Confirmed">Confirmed</option>
                <option value="Pending">Pending</option>
                <option value="Completed">Completed</option>
                <option value="Cancelled">Cancelled</option>
              </select>
              <i class="fas fa-filter"></i>
            </div>
          </div>

          <div id="bookingGrid"></div>
        </div>
      </div>
    </div>

    <div
      id="loginModal"
      style="
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        justify-content: center;
        align-items: center;
        z-index: 1000;
      "
    >
      <div
        style="
          background: white;
          padding: 20px;
          border-radius: 8px;
          text-align: center;
          width: 300px;
        "
      >
        <p style="margin-bottom: 20px">Login First</p>
        <button id="loginOkBtn" style="padding: 8px 16px; cursor: pointer">
          OK
        </button>
      </div>
    </div>
  </body>
</html>
