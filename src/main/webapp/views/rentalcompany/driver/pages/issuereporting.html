<!DOCTYPE html>
<html lang="en">
<head>
    <!-- =================== -->
    <!-- Meta & Stylesheets -->
    <!-- =================== -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Issue Reporting - Ride Machan</title>
    <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <link
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/issuereporting.css" />
</head>
<body>
<div class="container">
    <!-- ===================
         Sidebar Navigation
=================== -->
    <div class="sidebar" id="sidebar">
        <div class="logo">
            <img src="../logo.png" alt="Logo" class="logo">
        </div>
        <div class="nav-menu">
            <div class="nav-item">
                <i class="fas fa-house"></i>
                <a href="dashboard.html"><span>Home</span></a>
            </div>
            <div class="nav-item">
                <i class="fas fa-calendar-alt"></i>
                <a href="drivercalview.html"><span>Calendar</span></a>
            </div>
            <div class="nav-item">
                <i class="fas fa-clock"></i>
                <a href="ongoing.html"><span>Ongoing Bookings</span></a>
            </div>
            <div class="nav-item">
                <i class="fas fa-history"></i>
                <a href="pastbooking.html"><span>Past Bookings</span></a>
            </div>
            <div class="logout">
                <i class="fas fa-sign-out"></i>
                <span>Logout</span>
            </div>
        </div>
    </div>

    <!-- ===================
             Header Section
    =================== -->
    <div class="header">
        <div class="header-left">
            <button class="sidebar-toggle" id="sidebarToggle">
            </button>
            <h1>Issue Reporting</h1>
        </div>
        <div class="header-actions">
            <!-- Notifications -->
            <a href="notification.html"><div class="notification" id="bellNotification" title="Notifications">
                <i class="fas fa-bell"></i>
                <div class="badge" id="bellBadge">3</div></div></a>

        <a href="messages.html"><div class="notification" id="messageNotification" title="Messages">
            <i class="fas fa-envelope"></i>
            <div class="badge" id="messageBadge">5</div></div></a>
    <!-- User Profile -->
    <div class="user-profile" id="userProfile">
        <a href="profile.html"><div class="profile-img" id="profileImg">K</div></a>
        <div class="user-info">
            <div class="user-name" id="userName">Kamal</div>
        </div>
    </div>
</div>
</div>


<!-- =================== -->
<!-- Main Content -->
<!-- =================== -->
<div class="main-content">
    <!-- Issue Reporting Form -->
    <div class="issue-form-container">
        <div class="form-header">
            <i class="fas fa-plus-circle"></i>
            <h2>Report New Issue</h2>
        </div>

        <form id="issueForm">
            <div class="form-grid">
                <div class="form-group">
                    <label for="category">Category <span class="required">*</span></label>
                    <select id="category" name="category" class="form-control" required>
                        <option value="">Select category</option>
                        <option value="Engine Problem">Engine Problem</option>
                        <option value="Tire Issue">Tire Issue</option>
                        <option value="AC Problem">AC Problem</option>
                        <option value="Electrical Issue">Electrical Issue</option>
                        <option value="Brake Problem">Brake Problem</option>
                        <option value="Transmission Issue">Transmission Issue</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="location">Location of the Issue <span class="required">*</span></label>
                    <input type="text" id="location" name="location" class="form-control" placeholder="Enter location" required>
                </div>
            </div>

            <div class="form-group full-width">
                <label for="description">Description <span class="required">*</span></label>
                <textarea id="description" name="description" class="form-control" rows="4" placeholder="Describe the issue in detail" required></textarea>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label for="booking-id">Related Booking ID</label>
                    <input type="text" id="booking-id" name="bookingId" class="form-control" placeholder="Enter booking ID (if applicable)">
                </div>

                <div class="form-group">
                    <label for="plate-number">Vehicle Plate Number</label>
                    <input type="text" id="plate-number" name="plateNumber" class="form-control" placeholder="Enter vehicle plate number">
                </div>
            </div>

            <div class="form-group full-width upload-section">
                <label>Upload Photo</label>
                <div class="upload-area" id="uploadArea">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <div class="upload-text" id="uploadText">
                        <strong>Choose file</strong> or drag and drop
                    </div>
                    <input type="file" id="photoInput" name="photo" accept="image/*" style="display: none;">
                </div>
            </div>

            <div class="form-group full-width">
                <label>Is Vehicle Driveable?</label>
                <div class="radio-group">
                    <div class="radio-item">
                        <input type="radio" id="driveable-yes" name="driveable" value="yes">
                        <label for="driveable-yes">Yes</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="driveable-no" name="driveable" value="no">
                        <label for="driveable-no">No</label>
                    </div>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                <i class="fas fa-paper-plane"></i> Submit Report
            </button>
        </form>
    </div>

    <!-- Past Issues Section -->
    <div class="past-issues-section">
        <div class="section-header">
            <i class="fas fa-history"></i>
            <h2>Past Issues</h2>
        </div>

        <div id="loadingIssues" style="text-align: center; padding: 20px; display: none;">
            <i class="fas fa-spinner fa-spin" style="font-size: 24px; color: var(--primary);"></i>
            <p>Loading issues...</p>
        </div>

        <div id="noIssues" style="text-align: center; padding: 40px; display: none;">
            <i class="fas fa-clipboard-list" style="font-size: 48px; color: var(--text-light);"></i>
            <p style="color: var(--text-light); margin-top: 15px;">No issues reported yet</p>
        </div>

        <table class="issues-table" id="issuesTable" style="display: none;">
            <thead>
            <tr>
                <th>Issue ID</th>
                <th>Category</th>
                <th>Description</th>
                <th>Date</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>

        </table>
        <div id="issuesContainer">
        <!-- Issues will be loaded dynamically -->
        </div>
    </div>
</div>
</div>

<script src="../js/issuereporting.js" defer></script>







<div id="loginModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:1000;">
    <div style="background:white; padding:20px; border-radius:8px; text-align:center; width:300px;">
        <p style="margin-bottom:20px;">Login First</p>
        <button id="loginOkBtn" style="padding:8px 16px; cursor:pointer;">OK</button>
    </div>
</div>



</body>
</html>
