<!doctype html>
<html lang="en">
  <head>
    <!-- =================== -->
    <!-- Meta & Stylesheets -->
    <!-- =================== -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Messages - Driver</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/dashboard.css" />
    <link rel="stylesheet" href="../css/messages.css" />
  </head>
  <body>
    <div class="container">
      <!-- =================== -->
      <!-- Sidebar Navigation -->
      <!-- =================== -->
      <div class="sidebar" id="sidebar">
        <div class="logo">
          <img src="../logo.png" alt="Logo" class="logo" />
        </div>
        <div class="nav-menu">
          <div class="nav-item">
            <i class="fas fa-house"></i>
            <a href="dashboard.html"><span> Home</span></a>
          </div>
          <div class="nav-item">
            <i class="fas fa-calendar-alt"></i>
            <a href="drivercalview.html"><span>Calendar</span></a>
          </div>
          <div class="nav-item" data-page="ongoing">
            <i class="fas fa-clock"></i>
            <a href="ongoing.html"><span>Ongoing Bookings</span></a>
          </div>
          <div class="nav-item" data-page="bookings">
            <i class="fas fa-history"></i>
            <a href="pastbooking.html"><span>Past Bookings</span></a>
          </div>
          <div class="logout">
            <i class="fas fa-sign-out"></i>
            <span>Logout</span>
          </div>
        </div>
      </div>

      <!-- =================== -->
      <!-- Header Section -->
      <!-- =================== -->
      <div class="header">
        <div class="header-left">
          <button class="sidebar-toggle" id="sidebarToggle">
            <i class="fas fa-bars"></i>
          </button>
          <h1>Messages</h1>
        </div>
        <div class="header-actions">
          <!-- Notifications -->
          <a href="notification.html">
            <div
              class="notification"
              id="bellNotification"
              title="Notifications"
            >
              <i class="fas fa-bell"></i>
              <div class="badge" id="bellBadge">0</div>
            </div>
          </a>
          <a href="messages.html">
            <div
              class="notification active-page"
              id="messageNotification"
              title="Messages"
            >
              <i class="fas fa-envelope"></i>
              <div class="badge" id="messageBadge">0</div>
            </div>
          </a>
          <!-- User Profile -->
          <div class="user-profile" id="userProfile">
            <a href="profile.html"><div class="profile-img">D</div></a>
            <div class="user-info">
              <div class="user-name">Driver</div>
            </div>
          </div>
        </div>
      </div>

      <!-- =================== -->
      <!-- Main Content -->
      <!-- =================== -->
      <div class="main-content">
        <div class="messages-page-shell">
          <!-- Top Header Card -->
          <div class="messages-page-top">
            <div class="messages-page-title-wrap">
              <h2 class="messages-page-title">
                <i class="fas fa-comments"></i>
                Messages
              </h2>
              <p class="messages-page-subtitle">
                View and manage your conversations in one place
              </p>
            </div>

            <div class="messages-page-actions">
              <button
                class="btn btn-primary"
                id="newConversationBtn"
                type="button"
              >
                <i class="fas fa-plus"></i>
                New Conversation
              </button>
            </div>
          </div>

          <!-- Messaging Layout -->
          <div class="messaging-layout">
            <!-- Conversations Sidebar -->
            <div class="conversations-sidebar" id="conversationsSidebar">
              <div class="conversations-header">
                <div class="search-box">
                  <i class="fas fa-search"></i>
                  <input
                    type="text"
                    id="conversationSearch"
                    placeholder="Search conversations..."
                  />
                </div>
              </div>

              <div class="conversations-list" id="conversationsList">
                <div class="loading-state">
                  <i class="fas fa-spinner fa-spin"></i>
                  <p>Loading conversations...</p>
                </div>
              </div>
            </div>

            <!-- Chat Area -->
            <div class="chat-area" id="chatArea">
              <div class="no-conversation-selected">
                <i class="fas fa-comments"></i>
                <h3>Select a conversation</h3>
                <p>Choose a conversation from the sidebar or start a new one</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- New Conversation Modal -->
    <div class="modal" id="newConversationModal">
      <div class="modal-overlay"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h2>New Conversation</h2>
          <button class="modal-close" id="closeModalBtn" type="button">
            <i class="fas fa-times"></i>
          </button>
        </div>

        <div class="modal-body">
          <div class="form-group">
            <label class="form-label">Select User Type</label>
            <select class="form-select" id="userTypeSelect">
              <option value="">-- Select Type --</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Select User</label>
            <select class="form-select" id="userSelect">
              <option value="">-- Select a user type first --</option>
            </select>
          </div>

          <div
            class="permission-info"
            id="permissionInfo"
            style="display: none"
          >
            <i class="fas fa-info-circle"></i>
            <span id="permissionInfoText"></span>
          </div>

          <div class="modal-actions">
            <button class="btn btn-outline" id="cancelModalBtn" type="button">
              Cancel
            </button>
            <button
              class="btn btn-primary"
              id="startConversationBtn"
              type="button"
            >
              <i class="fas fa-paper-plane"></i>
              Start Conversation
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Toast container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Scripts -->
    <script>
      // Sidebar toggle for mobile (matches dashboard.js behaviour)
      document.addEventListener("DOMContentLoaded", function () {
        const sidebarToggle = document.getElementById("sidebarToggle");
        const sidebar = document.getElementById("sidebar");

        if (sidebarToggle && sidebar) {
          sidebarToggle.addEventListener("click", function (e) {
            e.stopPropagation();
            sidebar.classList.toggle("active");
          });
        }

        // Close sidebar on outside click (mobile)
        document.addEventListener("click", function (event) {
          if (window.innerWidth <= 992) {
            if (
              sidebar &&
              sidebarToggle &&
              !sidebar.contains(event.target) &&
              !sidebarToggle.contains(event.target)
            ) {
              sidebar.classList.remove("active");
            }
          }
        });

        // Logout handler (matches dashboard behaviour)
        const logoutBtn = document.querySelector(".logout");
        if (logoutBtn) {
          logoutBtn.addEventListener("click", async function () {
            if (!confirm("Are you sure you want to logout?")) return;
            try {
              await fetch("/driver/logout", {
                method: "POST",
                credentials: "include",
              });
            } catch (e) {
              /* ignore */
            }
            window.location.href =
              "http://localhost:8080/views/landing/index.html";
          });
        }
      });
    </script>

    <script src="../js/messages.js"></script>
  </body>
</html>
