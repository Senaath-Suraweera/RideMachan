<!DOCTYPE html>
<html lang="en">
<head>
  <!-- =================== -->
  <!-- Meta & Stylesheets -->
  <!-- =================== -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Driver Dashboard</title>
  <link
          rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
  />
  <link
          rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
  />
  <link
          href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet"
  />
  <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body>
<div class="container">
  <!-- =================== -->
  <!-- Sidebar Navigation -->
  <!-- =================== -->
  <div class="sidebar" id="sidebar">
    <div class="logo">
      <img src="../logo.png" alt="Logo" class="logo">
    </div>
    <div class="nav-menu">
      <div class="nav-item active">
        <i class="fas fa-house"></i>
        <a href="dashboard.html"><span> Home</span></a>
      </div>
      <div class="nav-item">
        <i class="fas fa-calendar-alt"></i>
        <a href="drivercalview.html"><span>Calendar</span></a>
      </div>
      <div class="nav-item" data-page="ongoing">
        <i class="fas fa-clock"></i>
        <a href="ongoing.html"><span>Ongoing Bookings</span></a>
      </div>
      <div class="nav-item" data-page="bookings">
        <i class="fas fa-history"></i>
        <a href="pastbooking.html"><span>Past Bookings</span></a>
      </div>
      <div class="logout">
        <i class="fas fa-sign-out"></i>
        <span>Logout</span>
      </div>
    </div>
  </div>

  <!-- ===================
           Header Section
  =================== -->
  <div class="header">
    <div class="header-left">
      <button class="sidebar-toggle" id="sidebarToggle">
        <i class="fas fa-bars"></i>
      </button>
      <h1>Driver Dashboard</h1>
    </div>
    <div class="header-actions">
      <!-- Notifications -->
      <a href="notification.html">
        <div class="notification" id="bellNotification" title="Notifications">
          <i class="fas fa-bell"></i>
          <div class="badge" id="bellBadge">0</div>
        </div>
      </a>
      <a href="messages.html">
        <div class="notification" id="messageNotification" title="Messages">
          <i class="fas fa-envelope"></i>
          <div class="badge" id="messageBadge">0</div>
        </div>
      </a>
      <!-- User Profile -->
      <div class="user-profile" id="userProfile">
        <a href="profile.html"><div class="profile-img">D</div></a>
        <div class="user-info">
          <div class="user-name">Driver</div>
        </div>
      </div>
    </div>
  </div>

  <!-- =================== -->
  <!-- Main Content -->
  <!-- =================== -->
  <div class="main-content">
    <!-- Stats Cards -->
    <div class="stats-section">
      <!-- Monthly Income Graph -->
      <div class="stat-card">
        <div class="stat-header">
          <h3>Monthly Income Graph</h3>
        </div>
        <div class="stat-value">RS 0.00</div>
        <div class="chart-container">
          <div class="bar-chart">
            <div class="bar" style="height: 40%" data-value="0"></div>
            <div class="bar" style="height: 60%" data-value="0"></div>
            <div class="bar" style="height: 80%" data-value="0"></div>
            <div class="bar" style="height: 100%" data-value="0"></div>
            <div class="bar" style="height: 90%" data-value="0"></div>
            <div class="bar" style="height: 70%" data-value="0"></div>
            <div class="bar" style="height: 85%" data-value="0"></div>
          </div>
        </div>
      </div>

      <!-- Weekly Bookings Number Graph -->
      <div class="stat-card">
        <div class="stat-header">
          <h3>Weekly Bookings Number Graph</h3>
        </div>
        <div class="stat-value">0</div>
        <div class="chart-container">
          <div class="bar-chart">
            <div class="bar" style="height: 50%" data-value="0"></div>
            <div class="bar" style="height: 70%" data-value="0"></div>
            <div class="bar" style="height: 90%" data-value="0"></div>
            <div class="bar" style="height: 80%" data-value="0"></div>
            <div class="bar" style="height: 100%" data-value="0"></div>
            <div class="bar" style="height: 75%" data-value="0"></div>
            <div class="bar" style="height: 60%" data-value="0"></div>
          </div>
        </div>
      </div>

      <!-- Daily Driving Hours Graph -->
      <div class="stat-card">
        <div class="stat-header">
          <h3>Daily Driving Hours Graph</h3>
        </div>
        <div class="stat-value">0.0h</div>
        <div class="chart-container">
          <div class="bar-chart">
            <div class="bar" style="height: 70%" data-value="0"></div>
            <div class="bar" style="height: 65%" data-value="0"></div>
            <div class="bar" style="height: 85%" data-value="0"></div>
            <div class="bar" style="height: 75%" data-value="0"></div>
            <div class="bar" style="height: 95%" data-value="0"></div>
            <div class="bar" style="height: 100%" data-value="0"></div>
            <div class="bar" style="height: 80%" data-value="0"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Pie Chart and Action Buttons Section -->
    <div class="bottom-section">
      <!-- Pie Chart Section -->
      <div class="pie-chart-section">
        <h3>Summary of Bookings</h3>
        <div class="pie-chart-container">
          <div class="pie-chart">
            <span class="percentage">0%</span>
          </div>
        </div>
        <div class="pie-stats">
          <div class="pie-stat-item">
            <span class="stat-label">Completed</span>
            <span class="stat-number">0</span>
          </div>
          <div class="pie-stat-item">
            <span class="stat-label">Pending</span>
            <span class="stat-number">0</span>
          </div>
          <div class="pie-stat-item">
            <span class="stat-label">Cancelled</span>
            <span class="stat-number">0</span>
          </div>
          <div class="pie-stat-item">
            <span class="stat-label">Total</span>
            <span class="stat-number">0</span>
          </div>
        </div>
      </div>

      <!-- Action Buttons Section -->
      <div class="action-buttons-section">
        <button class="action-btn message-btn">
          <i class="fas fa-comment"></i>
          Message Company
        </button>
        <button class="action-btn contact-btn">
          <i class="fas fa-phone"></i>
          Contact Admin
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Link to external JavaScript file -->
<script src="../js/dashboard.js"></script>
</body>
</html>
